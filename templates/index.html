<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kenji IA | Terminal</title>
    <style>
        :root { --accent: #00e5ff; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'JetBrains Mono', monospace; }
        
        body { background: var(--bg); height: 100dvh; overflow: hidden; display: flex; align-items: center; justify-content: center; color: var(--accent); }

        /* CANVAS DA CHUVA DIGITAL */
        #matrix { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.5; }

        .login-card {
            position: relative; z-index: 10;
            width: 90%; max-width: 360px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--accent);
            box-shadow: 0 0 20px var(--accent);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .brand { font-size: 2rem; font-weight: 900; letter-spacing: 5px; margin-bottom: 30px; text-shadow: 0 0 10px var(--accent); }

        input {
            width: 100%; padding: 15px; background: #000; border: 1px solid #333;
            color: #fff; margin-bottom: 20px; outline: none; text-align: center;
            font-size: 1rem; border-radius: 0;
        }
        input:focus { border-color: var(--accent); }

        button {
            width: 100%; padding: 15px; background: var(--accent); color: #000;
            border: none; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        .status { font-size: 10px; margin-top: 20px; opacity: 0.5; }
    </style>
</head>
<body onclick="startAll()">

    <canvas id="matrix"></canvas>

    <div class="login-card">
        <div class="brand">KENJI IA</div>
        <input type="password" id="pass" placeholder="DIGITE A SENHA">
        <button onclick="login()">Ativar Sistema</button>
        <div class="status" id="audio-status">SISTEMA: AGUARDANDO INTERAÇÃO</div>
    </div>

    <audio id="bgm" loop><source src="/static/musica.mp3" type="audio/mpeg"></audio>

    <script>
        // --- EFEITO MATRIX ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00e5ff";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- FUNÇÕES DE SISTEMA ---
        let initialized = false;
        function startAll() {
            if(!initialized) {
                document.getElementById('bgm').play().catch(() => {});
                document.getElementById('audio-status').innerText = "AUDIO: ONLINE | MATRIX: ACTIVE";
                initialized = true;
            }
        }

        async function login() {
            const senha = document.getElementById('pass').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({senha: senha})
            });
            if(res.ok) window.location.href = '/';
            else alert('ACESSO NEGADO');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kenji IA | Login</title>
    <style>
        body { background: #000; margin: 0; height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; font-family: monospace; }
        canvas { position: absolute; top: 0; left: 0; opacity: 0.4; }
        .card { position: relative; z-index: 10; background: rgba(0,0,0,0.9); border: 1px solid #00e5ff; padding: 40px; text-align: center; width: 85%; max-width: 350px; box-shadow: 0 0 20px #00e5ff44; }
        h1 { color: #00e5ff; letter-spacing: 5px; margin-bottom: 30px; font-size: 1.5rem; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 20px; outline: none; text-align: center; }
        button { width: 100%; padding: 15px; background: #00e5ff; color: #000; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onclick="document.getElementById('m').play()">
    <canvas id="mtx"></canvas>
    <div class="card">
        <h1>KENJI IA</h1>
        <input type="password" id="p" placeholder="SENHA MESTRA">
        <button onclick="l()">ACESSAR</button>
    </div>
    <audio id="m" loop><source src="/static/musica.mp3" type="audio/mpeg"></audio>
    <script>
        const c = document.getElementById('mtx'), ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const s = 16, cols = c.width / s, d = Array(Math.floor(cols)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = "#00e5ff"; ctx.font = s + "px monospace";
            d.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(Math.random() * 128), i * s, y * s);
                if (y * s > c.height && Math.random() > 0.975) d[i] = 0; d[i]++;
            });
        }
        setInterval(draw, 50);
        async function l() {
            const p = document.getElementById('p').value;
            const res = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({senha:p})});
            if(res.ok) window.location.href='/'; else alert('NEGADO');
        }
    </script>
</body>
</html>

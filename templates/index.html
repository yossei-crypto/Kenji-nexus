<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kenji IA | Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #050505; --accent: #00e5ff; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); font-family: 'JetBrains Mono', monospace; }
        
        /* HEADER FIXO */
        header {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--accent);
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 100;
        }

        /* NOME COM EFEITO */
        .brand { font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

        /* CHAT COM FIX DE VAZAMENTO */
        #chat-wrapper {
            position: absolute; top: 60px; bottom: 80px; width: 100%;
            overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px;
            word-wrap: break-word; overflow-wrap: break-word;
        }

        .msg { max-width: 90%; padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-end; background: #1a1a1a; border: 1px solid #333; color: #fff; }
        .ai { align-self: flex-start; width: 100%; border-left: 2px solid var(--accent); color: var(--text); position: relative; }

        /* BLOCOS DE CÓDIGO (FIX VAZAMENTO + BOTÃO COPIAR) */
        pre {
            background: #000; padding: 35px 15px 15px; border-radius: 5px; 
            margin: 10px 0; overflow-x: auto; border: 1px solid #222; position: relative;
            max-width: 100%; white-space: pre-wrap; word-break: break-all;
        }
        .copy-btn {
            position: absolute; top: 5px; right: 5px; background: var(--accent);
            color: #000; border: none; padding: 4px 8px; border-radius: 3px;
            font-size: 10px; font-weight: bold; cursor: pointer;
        }

        /* INPUT AREA */
        .input-zone {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: #000; padding: 10px; display: flex; gap: 10px;
        }
        input { flex: 1; background: #111; border: 1px solid var(--accent); color: #fff; padding: 0 15px; border-radius: 25px; outline: none; }
        
        /* SIDEBAR */
        #sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 260px;
            background: #000; z-index: 200; transform: translateX(-100%);
            transition: 0.3s; border-right: 1px solid var(--accent);
        }
        #sidebar.open { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 20px;">
            <button onclick="novaMissao()" style="width:100%; padding:10px; background:var(--accent); border:none; font-weight:bold;">+ NOVA MISSÃO</button>
            <div id="historico" style="margin-top:20px;"></div>
        </div>
    </div>

    <header>
        <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="background:none; border:none; color:var(--accent); font-size:24px;">☰</button>
        <div class="brand">Kenji IA</div>
        <a href="https://instagram.com/cybernmap" target="_blank" style="color:var(--accent); text-decoration:none; font-size:10px;">@cybernmap</a>
        <button onclick="location.href='/logout'" style="background:none; border:1px solid #ff3e3e; color:#ff3e3e; padding:5px; border-radius:4px; font-size:10px;">SAIR</button>
    </header>

    <div id="chat-wrapper"></div>

    <div class="input-zone">
        <input type="text" id="user-input" placeholder="Comando tático..." autocomplete="off">
        <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:24px;">➤</button>
    </div>

    <script>
        let convId = null;
        let startX = 0;

        // ARRASTAR PARA ABRIR SIDEBAR
        document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            let diff = e.changedTouches[0].clientX - startX;
            if (diff > 100) document.getElementById('sidebar').classList.add('open');
            if (diff < -100) document.getElementById('sidebar').classList.remove('open');
        });

        async function carregarSidebar() {
            const res = await fetch('/carregar_conversas');
            const data = await res.json();
            document.getElementById('historico').innerHTML = data.map(c => 
                `<div onclick="carregarChat('${c.id}')" style="padding:10px; color:#555; border-bottom:1px solid #111; cursor:pointer;">> ${c.titulo}</div>`
            ).join('');
        }

        async function novaMissao() {
            const res = await fetch('/nova_conversa', {method: 'POST'});
            const data = await res.json();
            convId = data.id;
            document.getElementById('chat-wrapper').innerHTML = '';
            document.getElementById('sidebar').classList.remove('open');
            carregarSidebar();
        }

        async function carregarChat(id) {
            convId = id;
            document.getElementById('sidebar').classList.remove('open');
            const res = await fetch(`/carregar_historico/${id}`);
            const msgs = await res.json();
            const box = document.getElementById('chat-wrapper');
            box.innerHTML = '';
            msgs.forEach(m => addBubble(m.content, m.role));
        }

        function addBubble(txt, role) {
            const box = document.getElementById('chat-wrapper');
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
            div.innerHTML = role === 'assistant' ? marked.parse(txt) : txt;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            
            // ADICIONAR BOTÕES DE COPIAR EM CÓDIGOS
            div.querySelectorAll('pre').forEach(pre => {
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerText = 'COPIAR';
                btn.onclick = () => {
                    navigator.clipboard.writeText(pre.innerText.replace('COPIAR', ''));
                    btn.innerText = 'OK!';
                    setTimeout(() => btn.innerText = 'COPIAR', 2000);
                };
                pre.appendChild(btn);
            });
        }

        async function enviar() {
            const inp = document.getElementById('user-input');
            const val = inp.value.trim();
            if(!val || !convId) return;
            inp.value = '';
            addBubble(val, 'user');
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mensagem: val, conversa_id: convId})
            });
            const data = await res.json();
            addBubble(data.resposta, 'assistant');
        }

        document.getElementById('user-input').onkeypress = (e) => e.key === 'Enter' && enviar();
        window.onload = () => { carregarSidebar(); novaMissao(); };
    </script>
</body>
</html>

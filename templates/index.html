<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kenji IA | Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --green: #00ff88;
            --green-dim: rgba(0,255,136,0.12);
            --green-glow: rgba(0,255,136,0.35);
            --cyan: #00ccff;
            --purple: #aa55ff;
            --bg: #03030a;
            --bg2: rgba(7,7,15,0.92);
            --surface: rgba(12,12,24,0.85);
            --border: rgba(0,255,136,0.18);
            --border-strong: rgba(0,255,136,0.45);
            --text: #c8c8d8;
            --text-dim: #55556a;
            --red: #ff4466;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100dvh; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; }

        /* ── CANVAS BACKGROUND ── */
        #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* ── VIGNETTE ── */
        .vignette { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 20%, rgba(3,3,10,0.7) 100%); z-index: 1; pointer-events: none; }

        /* ── NOISE ── */
        .noise { position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 2; opacity: 0.4; }

        /* ── SCANLINE ── */
        .scanline { position: fixed; left: 0; right: 0; height: 120px; background: linear-gradient(transparent, rgba(0,255,136,0.025), transparent); animation: scan 9s linear infinite; z-index: 3; pointer-events: none; }
        @keyframes scan { from { top: -120px; } to { top: 100vh; } }

        /* ── MUSIC BTN ── */
        #music-btn { flex-shrink: 0; width: 34px; height: 34px; border-radius: 8px; background: none; border: 1px solid var(--border); color: var(--green); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        #music-btn:hover { background: var(--green-dim); border-color: var(--green); }
        #music-btn.playing { background: var(--green-dim); border-color: var(--green); animation: musicPulse 1.2s ease-in-out infinite; }
        @keyframes musicPulse { 0%,100% { box-shadow: 0 0 6px rgba(0,255,136,0.3); } 50% { box-shadow: 0 0 14px rgba(0,255,136,0.6); } }

        /* ── LAYOUT ── */
        #app  { display: flex; height: 100dvh; position: relative; z-index: 10; }
        #main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100dvh; }

        /* ── SIDEBAR ── */
        #sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 290px; background: rgba(5,5,12,0.97); border-right: 1px solid var(--border); z-index: 200; transform: translateX(-100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; backdrop-filter: blur(16px); }
        #sidebar.open { transform: translateX(0); }
        #sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; color: var(--green); letter-spacing: 4px; }
        #btn-nova { margin: 16px; padding: 12px 16px; background: var(--green-dim); border: 1px solid var(--border-strong); color: var(--green); font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: 2px; border-radius: 6px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; display: flex; align-items: center; gap: 8px; width: calc(100% - 32px); }
        #btn-nova:hover { background: rgba(0,255,136,0.2); box-shadow: 0 0 16px var(--green-glow); }
        #btn-nova::before { content: '+'; font-size: 18px; }
        #hist { flex: 1; overflow-y: auto; padding: 8px 0; }
        #hist::-webkit-scrollbar { width: 4px; }
        #hist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .hist-item { padding: 11px 20px; color: var(--text-dim); font-size: 11px; letter-spacing: 0.5px; cursor: pointer; border-left: 2px solid transparent; transition: all 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hist-item:hover, .hist-item.active { color: var(--green); border-left-color: var(--green); background: var(--green-dim); }
        .hist-item::before { content: '> '; color: var(--green); opacity: 0.4; }
        #sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-dim); }

        /* ── OVERLAY ── */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); z-index: 199; display: none; opacity: 0; transition: opacity 0.28s; }
        #overlay.visible { display: block; opacity: 1; }

        /* ── HEADER ── */
        header { padding: 0 20px; height: 56px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; background: var(--bg2); flex-shrink: 0; backdrop-filter: blur(16px); }
        #menu-btn { background: none; border: 1px solid var(--border); color: var(--green); width: 36px; height: 36px; border-radius: 6px; cursor: pointer; font-size: 16px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        #menu-btn:hover { background: var(--green-dim); border-color: var(--green); }
        .header-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; color: var(--green); letter-spacing: 5px; flex: 1; text-shadow: 0 0 16px rgba(0,255,136,0.4); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .header-status { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }
        .header-link { color: var(--text-dim); text-decoration: none; font-size: 10px; letter-spacing: 1px; transition: color 0.2s; padding: 6px 10px; border: 1px solid transparent; border-radius: 4px; }
        .header-link:hover { color: var(--green); border-color: var(--border); }

        /* ── CHAT ── */
        #chat { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 0; scroll-behavior: smooth; }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── WELCOME ── */
        #welcome { margin: auto; text-align: center; padding: 40px 20px; animation: fadeUp 0.5s ease; }
        #welcome .big { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; color: var(--green); letter-spacing: 8px; line-height: 1; text-shadow: 0 0 30px rgba(0,255,136,0.4); }
        #welcome .sub { font-size: 11px; color: var(--text-dim); letter-spacing: 3px; margin-top: 10px; }
        #welcome .prompt { font-size: 11px; color: var(--text-dim); margin-top: 40px; letter-spacing: 1px; }
        #welcome .prompt span { color: var(--green); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        /* ── MESSAGES ── */
        .msg-wrap { display: flex; flex-direction: column; margin-bottom: 16px; animation: msgIn 0.2s ease; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .msg-wrap.user { align-items: flex-end; }
        .msg-wrap.ai   { align-items: flex-start; }
        .msg-meta { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 5px; padding: 0 4px; }
        .msg-wrap.user .msg-meta { color: rgba(0,255,136,0.35); }
        .msg { max-width: min(88%, 720px); padding: 13px 16px; font-size: 13px; line-height: 1.65; border-radius: 10px; }
        .msg-wrap.user .msg { background: rgba(12,12,24,0.9); border: 1px solid rgba(255,255,255,0.07); color: #ddd; border-radius: 10px 10px 2px 10px; backdrop-filter: blur(8px); }
        .msg-wrap.ai   .msg { background: rgba(0,255,136,0.03); border-left: 2px solid var(--green); border-radius: 0 10px 10px 10px; width: 100%; max-width: 100%; backdrop-filter: blur(4px); }

        /* ── TYPING CURSOR na mensagem da IA ── */
        .ai-cursor { display: inline-block; width: 8px; height: 14px; background: var(--green); margin-left: 2px; vertical-align: middle; animation: cursorBlink 0.7s step-end infinite; border-radius: 1px; }
        @keyframes cursorBlink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

        /* ── IMAGE IN CHAT ── */
        .msg img { max-width: 100%; max-height: 300px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border); display: block; }

        /* ── MARKDOWN ── */
        .msg p { margin-bottom: 10px; }
        .msg p:last-child { margin-bottom: 0; }
        .msg h1,.msg h2,.msg h3 { font-family: 'Syne', sans-serif; color: var(--green); margin: 16px 0 8px; }
        .msg h1 { font-size: 18px; } .msg h2 { font-size: 15px; } .msg h3 { font-size: 13px; }
        .msg strong { color: #fff; }
        .msg em { color: #aaa; font-style: italic; }
        .msg a { color: var(--green); }
        .msg ul,.msg ol { padding-left: 20px; margin: 8px 0; }
        .msg li { margin-bottom: 4px; }
        .msg blockquote { border-left: 2px solid var(--green); padding-left: 12px; color: var(--text-dim); margin: 8px 0; }
        .msg code:not(pre code) { background: rgba(0,255,136,0.1); color: var(--green); padding: 1px 6px; border-radius: 3px; font-size: 12px; }
        .msg pre { background: #000; border: 1px solid var(--border); border-radius: 8px; overflow-x: auto; margin: 12px 0; }
        .code-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; background: rgba(0,255,136,0.05); border-bottom: 1px solid var(--border); border-radius: 8px 8px 0 0; }
        .code-lang { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
        .msg pre code { display: block; padding: 14px; font-size: 12px; color: #a8e6c8; line-height: 1.6; }
        .copy-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 3px 10px; font-size: 9px; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; cursor: pointer; border-radius: 4px; transition: all 0.15s; }
        .copy-btn:hover, .copy-btn.ok { color: var(--green); border-color: var(--green); }

        /* ── TYPING INDICATOR ── */
        #typing { display: none; align-items: center; gap: 5px; padding: 10px 14px; font-size: 11px; color: var(--text-dim); }
        #typing.visible { display: flex; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: bounce 1.1s infinite; }
        .dot:nth-child(2) { animation-delay: 0.18s; }
        .dot:nth-child(3) { animation-delay: 0.36s; }
        @keyframes bounce { 0%,80%,100% { transform: scale(0.5); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

        /* ── INPUT ZONE ── */
        #input-zone { padding: 12px 16px; background: var(--bg2); border-top: 1px solid var(--border); flex-shrink: 0; backdrop-filter: blur(16px); }
        #input-row { display: flex; align-items: flex-end; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; transition: border-color 0.2s, box-shadow 0.2s; backdrop-filter: blur(8px); }
        #input-row:focus-within { border-color: var(--border-strong); box-shadow: 0 0 0 3px rgba(0,255,136,0.07); }
        #inp { flex: 1; background: none; border: none; outline: none; color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.5; resize: none; max-height: 120px; overflow-y: auto; padding: 0; }
        #inp::placeholder { color: var(--text-dim); }

        /* image preview */
        #img-preview-wrap { position: relative; flex-shrink: 0; }
        #img-preview { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border-strong); display: none; }
        #img-preview.visible { display: block; }
        #img-remove { position: absolute; top: -6px; right: -6px; width: 16px; height: 16px; background: var(--red); border: none; border-radius: 50%; color: #fff; font-size: 10px; cursor: pointer; display: none; align-items: center; justify-content: center; line-height: 1; }
        #img-remove.visible { display: flex; }

        /* buttons */
        .tool-btn { flex-shrink: 0; width: 34px; height: 34px; background: rgba(0,255,136,0.05); border: 1px solid var(--border); border-radius: 8px; color: #aaa; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .tool-btn:hover { color: var(--green); border-color: var(--green); background: var(--green-dim); }
        .tool-btn svg { width: 17px; height: 17px; stroke-width: 1.8px; }
        #audio-btn { color: #aaa; }
        #audio-btn.recording { color: var(--red) !important; border-color: var(--red) !important; background: rgba(255,68,102,0.12) !important; animation: recPulse 1s ease-in-out infinite; }
        @keyframes recPulse { 0%,100% { box-shadow: 0 0 0 rgba(255,68,102,0.4); } 50% { box-shadow: 0 0 12px rgba(255,68,102,0.7); } }
        #send-btn { flex-shrink: 0; width: 36px; height: 36px; background: var(--green); border: none; border-radius: 8px; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        #send-btn:hover { box-shadow: 0 0 16px var(--green-glow); transform: scale(1.05); }
        #send-btn:active { transform: scale(0.95); }
        #send-btn:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }
        #send-btn svg { width: 16px; height: 16px; }

        /* toast */
        #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a0a0f; border: 1px solid var(--red); color: var(--red); padding: 10px 20px; border-radius: 8px; font-size: 12px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 500; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    </style>
</head>
<body>

<!-- Background -->
<canvas id="bg-canvas"></canvas>
<div class="vignette"></div>
<div class="noise"></div>
<div class="scanline"></div>

<!-- YouTube player oculto -->
<div id="yt-player" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;pointer-events:none;"></div>



<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
    <div id="sidebar-header"><div class="logo-text">KENJI IA</div></div>
    <button id="btn-nova" onclick="nova()">Nova Missão</button>
    <div id="hist"></div>
    <div id="sidebar-footer">
        <a href="https://instagram.com/cybernmap" target="_blank" rel="noopener" style="color:var(--green);text-decoration:none;">@cybernmap</a> · v2.1
    </div>
</div>

<div id="app">
    <div id="main">
        <header>
            <button id="menu-btn" onclick="toggleSidebar()" aria-label="Menu">☰</button>
            <div class="header-title">KENJI IA</div>
            <div class="header-status"><div class="status-dot"></div><span>ONLINE</span></div>
            <a href="https://instagram.com/cybernmap" target="_blank" rel="noopener" class="header-link">@cybernmap</a>
        </header>

        <div id="chat">
            <div id="welcome">
                <div class="big">KENJI</div>
                <div class="sub">SISTEMA OPERACIONAL IA</div>
                <div class="prompt">Aguardando <span>// comando</span> _</div>
            </div>
        </div>

        <div id="typing">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <span style="font-size:10px;letter-spacing:1px;margin-left:4px;">processando...</span>
        </div>

        <div id="input-zone">
            <div id="input-row">
                <button id="music-btn" class="tool-btn" onclick="toggleMusic()" title="Música">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>

                </button>
                <div id="img-preview-wrap">
                    <img id="img-preview" alt="preview">
                    <button id="img-remove" onclick="removeImage()" aria-label="Remover imagem">✕</button>
                </div>
                <textarea id="inp" placeholder="Aguardando comando..." rows="1" autocomplete="off"></textarea>
                <!-- Botão imagem -->
                <button id="img-btn" class="tool-btn" onclick="document.getElementById('img-input').click()" aria-label="Anexar imagem" title="Enviar imagem">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3"/>

                    </svg>
                </button>
                <input type="file" id="img-input" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none" onchange="onImageSelected(this)">
                <!-- Botão áudio -->

                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="2" width="6" height="12" rx="3"/>
                        <path d="M5 10a7 7 0 0014 0"/>
                        <line x1="12" y1="19" x2="12" y2="22"/>
                        <line x1="9" y1="22" x2="15" y2="22"/>
                    </svg>
                </button>
                <!-- Botão enviar -->
                <button id="send-btn" onclick="env()" aria-label="Enviar">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
    
        </div>
    </div>
</div>

<div id="toast"></div>

<!-- YouTube API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
// ===========================================
// CANVAS — PARTICLE NETWORK
// ===========================================
const canvas = document.getElementById('bg-canvas');
const ctx    = canvas.getContext('2d');

canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    initParticles();
}, { passive: true });

const COLORS = ['#00ff88','#00ccff','#aa55ff','#ff0055','#ffcc00'];
let particles = [];
let mouse = { x: canvas.width / 2, y: canvas.height / 2 };

window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; }, { passive: true });

class Particle {
    constructor() { this.init(); }
    init() {
        this.x      = Math.random() * canvas.width;
        this.y      = Math.random() * canvas.height;
        this.vx     = (Math.random() - 0.5) * 0.5;
        this.vy     = (Math.random() - 0.5) * 0.5;
        this.radius = Math.random() * 2.5 + 1;
        this.color  = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.alpha  = Math.random() * 0.5 + 0.2;
        this.pulse  = Math.random() * Math.PI * 2;
    }
    update() {
        this.pulse += 0.02;
        this.x += this.vx;
        this.y += this.vy;
        const dx = this.x - mouse.x, dy = this.y - mouse.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 100) { this.x += dx/dist*0.8; this.y += dy/dist*0.8; }
        if (this.x < -10) this.x = canvas.width+10;
        if (this.x > canvas.width+10) this.x = -10;
        if (this.y < -10) this.y = canvas.height+10;
        if (this.y > canvas.height+10) this.y = -10;
    }
    draw() {
        const a = this.alpha * (0.7 + 0.3 * Math.sin(this.pulse));
        ctx.globalAlpha = a;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.fillStyle   = this.color;
        ctx.shadowBlur  = 10;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.shadowBlur  = 0;
    }
}

function initParticles() {
    const count = Math.floor((canvas.width * canvas.height) / 12000);
    particles = Array.from({ length: Math.min(count, 120) }, () => new Particle());
}

function drawLines() {
    for (let i = 0; i < particles.length; i++) {
        for (let j = i+1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const d2 = dx*dx + dy*dy;
            if (d2 < 25600) { // 160^2
                const dist = Math.sqrt(d2);
                const grad = ctx.createLinearGradient(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                grad.addColorStop(0, particles[i].color);
                grad.addColorStop(1, particles[j].color);
                ctx.globalAlpha = (1 - dist/160) * 0.3;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = grad;
                ctx.lineWidth   = 0.8;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }
    }
}

function animateBG() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    drawLines();
    requestAnimationFrame(animateBG);
}

initParticles();
animateBG();

// ===========================================
// YOUTUBE PLAYER (oculto)
// ===========================================
let ytPlayer = null, ytReady = false, musicPlaying = false;

function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('yt-player', {
        videoId: 'XMEXPkPmmq0',
        playerVars: { autoplay:0, loop:1, playlist:'XMEXPkPmmq0', controls:0, disablekb:1, fs:0 },
        events: {
            onReady: () => { ytReady = true; },
            onStateChange: e => { if (e.data === YT.PlayerState.ENDED) ytPlayer.playVideo(); }
        }
    });
}

function toggleMusic() {
    if (!ytReady) return;
    const btn = document.getElementById('music-btn');
    if (musicPlaying) {
        ytPlayer.pauseVideo();
        btn.textContent = '🎵';
        btn.classList.remove('playing');
        musicPlaying = false;
    } else {
        ytPlayer.setVolume(35);
        ytPlayer.playVideo();
        btn.textContent = '🔊';
        btn.classList.add('playing');
        musicPlaying = true;
    }
}

// ===========================================
// CHAT APP
// ===========================================
let cid = null, isLoading = false, selectedImage = null;

// ── Sidebar ──
function toggleSidebar() {
    const open = document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('visible', open);
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('visible');
}

// swipe
let tx = 0;
document.addEventListener('touchstart', e => tx = e.touches[0].clientX, { passive: true });
document.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (dx > 80 && tx < 40) toggleSidebar();
    if (dx < -80) closeSidebar();
}, { passive: true });

// ── API ──
async function fetchJSON(url, opts = {}) {
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
}

async function nova() {
    try {
        const d = await fetchJSON('/nova_conversa', { method: 'POST' });
        cid = d.id;
        document.getElementById('chat').innerHTML = welcomeHTML();
        closeSidebar();
        carregar();
    } catch { showToast('Erro ao criar conversa'); }
}

async function carregar() {
    try {
        const d    = await fetchJSON('/carregar_conversas');
        const hist = document.getElementById('hist');
        hist.innerHTML = d.length
            ? d.map(c => `<div class="hist-item ${c.id===cid?'active':''}" onclick="setChat('${c.id}')">${esc(c.titulo)}</div>`).join('')
            : '<div style="padding:16px 20px;font-size:10px;color:var(--text-dim);">Nenhuma missão anterior</div>';
    } catch { /* silently fail */ }
}

async function setChat(id) {
    try {
        cid = id;
        closeSidebar();
        const msgs = await fetchJSON(`/carregar_historico/${id}`);
        document.getElementById('chat').innerHTML = '';
        msgs.forEach(m => addMsg(m.content, m.role, null, false));
        carregar();
    } catch { showToast('Erro ao carregar histórico'); }
}

// ── Image ──
function onImageSelected(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 10*1024*1024) { showToast('Imagem muito grande (máx 10MB)'); input.value=''; return; }
    selectedImage = file;
    const reader = new FileReader();
    reader.onload = e => {
        document.getElementById('img-preview').src = e.target.result;
        document.getElementById('img-preview').classList.add('visible');
        document.getElementById('img-remove').classList.add('visible');
    };
    reader.readAsDataURL(file);
}

function removeImage() {
    selectedImage = null;
    document.getElementById('img-input').value = '';
    document.getElementById('img-preview').classList.remove('visible');
    document.getElementById('img-remove').classList.remove('visible');
}

// ── Helpers ──
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeStr() { return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function welcomeHTML() {
    return `<div id="welcome"><div class="big">KENJI</div><div class="sub">SISTEMA OPERACIONAL IA</div><div class="prompt">Aguardando <span>// comando</span> _</div></div>`;
}

// ── Add message (sem typewriter) ──
function addMsg(text, role, imgSrc = null, animate = true) {
    document.getElementById('welcome')?.remove();
    const chat = document.getElementById('chat');

    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${role==='user'?'user':'ai'}`;

    const meta = document.createElement('div');
    meta.className   = 'msg-meta';
    meta.textContent = (role==='user'?'VOCÊ':'KENJI') + ' · ' + timeStr();

    const msg = document.createElement('div');
    msg.className = 'msg';

    if (imgSrc) {
        const img = document.createElement('img');
        img.src = imgSrc; img.alt = 'imagem enviada';
        msg.appendChild(img);
    }

    if (role === 'assistant') {
        msg.innerHTML += marked.parse(text);
        addCopyButtons(msg);
    } else {
        const p = document.createElement('p');
        p.textContent = text;
        msg.appendChild(p);
    }

    wrap.appendChild(meta);
    wrap.appendChild(msg);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
}

// ── Add AI message com efeito de digitação ──
function addMsgTypewriter(text, role) {
    document.getElementById('welcome')?.remove();
    const chat = document.getElementById('chat');

    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ai';

    const meta = document.createElement('div');
    meta.className   = 'msg-meta';
    meta.textContent = 'KENJI · ' + timeStr();

    const msg = document.createElement('div');
    msg.className = 'msg';

    // Cursor piscante
    const cursor = document.createElement('span');
    cursor.className = 'ai-cursor';
    msg.appendChild(cursor);

    wrap.appendChild(meta);
    wrap.appendChild(msg);
    chat.appendChild(wrap);

    // Divide o texto em tokens (palavras + espaços) para simular streaming
    const tokens = tokenize(text);
    let built    = '';
    let i        = 0;

    // Velocidade variável: mais rápido no início, desacelera no fim
    function getDelay() {
        const base = 12;
        const rand = Math.random() * 8;
        return base + rand;
    }

    // Contador para não tocar som em CADA token (evita saturação)
    let soundTick = 0;

    function typeNext() {
        if (i >= tokens.length) {
            cursor.remove();
            msg.innerHTML = marked.parse(text);
            addCopyButtons(msg);
            chat.scrollTop = chat.scrollHeight;
            return;
        }

        const token = tokens[i++];
        built += token;

        msg.innerHTML = marked.parse(built);
        msg.appendChild(cursor);
        chat.scrollTop = chat.scrollHeight;

        // Som de teclado a cada 3 tokens para não saturar
        soundTick++;
        if (soundTick % 3 === 0 && token.trim().length > 0) {
            const t = token.trim().slice(-1);
            if (['.','!','?'].includes(t))  playKeyClick('enter');
            else                            playKeyClick('normal');
        }

        // Pausa maior em pontuação
        const lastChar  = built.trim().slice(-1);
        const pauseChar = ['.','!','?','\n'].includes(lastChar);
        setTimeout(typeNext, pauseChar ? getDelay() * 4 : getDelay());
    }

    typeNext();
}

// Divide texto em tokens pequenos para animação fluida
function tokenize(text) {
    // Divide em caracteres agrupados para velocidade boa
    const tokens = [];
    let i = 0;
    while (i < text.length) {
        // Pega de 1-3 chars por vez para parecer natural
        const chunk = Math.floor(Math.random() * 3) + 1;
        tokens.push(text.slice(i, i + chunk));
        i += chunk;
    }
    return tokens;
}

// Adiciona botões de copiar nos blocos de código
function addCopyButtons(msg) {
    msg.querySelectorAll('pre').forEach(pre => {
        if (pre.querySelector('.code-header')) return; // já tem
        const code = pre.querySelector('code');
        const lang = (code?.className.match(/language-(\w+)/)||[])[1] || 'código';
        const header = document.createElement('div');
        header.className = 'code-header';
        header.innerHTML = `<span class="code-lang">${lang.toUpperCase()}</span>`;
        const btn = document.createElement('button');
        btn.className   = 'copy-btn';
        btn.textContent = 'COPIAR';
        btn.onclick = () => {
            navigator.clipboard.writeText((code||pre).innerText.trim()).then(() => {
                btn.textContent = '✓ OK';
                btn.classList.add('ok');
                setTimeout(() => { btn.textContent='COPIAR'; btn.classList.remove('ok'); }, 2000);
            });
        };
        header.appendChild(btn);
        pre.insertBefore(header, pre.firstChild);
    });
}

// ── Send ──
async function env() {
    const inp  = document.getElementById('inp');
    const text = inp.value.trim();
    if ((!text && !selectedImage) || !cid || isLoading) return;

    isLoading = true;
    const imgSrc = selectedImage ? URL.createObjectURL(selectedImage) : null;
    inp.value = '';
    inp.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
    document.getElementById('typing').classList.add('visible');

    addMsg(text || '📷 Imagem enviada', 'user', imgSrc);

    try {
        let d;
        if (selectedImage) {
            const form = new FormData();
            if (text) form.append('mensagem', text);
            form.append('conversa_id', cid);
            form.append('imagem', selectedImage);
            const res = await fetch('/chat', { method:'POST', body:form });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            d = await res.json();
        } else {
            d = await fetchJSON('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensagem: text, conversa_id: cid }),
            });
        }

        document.getElementById('typing').classList.remove('visible');

        if (d.error) { showToast(d.error); }
        else         { addMsgTypewriter(d.resposta, 'assistant'); } // ← efeito de digitação

        carregar();
    } catch {
        document.getElementById('typing').classList.remove('visible');
        showToast('Erro ao enviar mensagem');
    } finally {
        isLoading = false;
        document.getElementById('send-btn').disabled = false;
        removeImage();
        inp.focus();
    }
}

// ===========================================
// KEYBOARD SOUND — suave e realista
// ===========================================
let audioCtx = null;

function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function playKeyClick(type = 'normal') {
    try {
        const ctx  = getAudioCtx();
        const now  = ctx.currentTime;

        // Mastervolume baixo e suave
        const master = ctx.createGain();
        master.gain.setValueAtTime(type === 'enter' ? 0.06 : 0.035, now);
        master.connect(ctx.destination);

        // --- Clique suave com noise curto ---
        const bufLen = Math.floor(ctx.sampleRate * 0.018); // 18ms
        const buf    = ctx.createBuffer(1, bufLen, ctx.sampleRate);
        const data   = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++) {
            // envelope: ataque instantâneo, decay suave
            const env = Math.pow(1 - i / bufLen, 2.5);
            data[i]   = (Math.random() * 2 - 1) * env;
        }

        const noise = ctx.createBufferSource();
        noise.buffer = buf;

        // Filtro: tecla normal = highpass (som seco), enter = bandpass (mais corpo)
        const filter = ctx.createBiquadFilter();
        if (type === 'enter') {
            filter.type            = 'bandpass';
            filter.frequency.value = 1200;
            filter.Q.value         = 0.8;
        } else if (type === 'backspace') {
            filter.type            = 'bandpass';
            filter.frequency.value = 1800;
            filter.Q.value         = 0.6;
        } else {
            filter.type            = 'highpass';
            filter.frequency.value = 2500 + Math.random() * 800;
            filter.Q.value         = 0.5;
        }

        noise.connect(filter);
        filter.connect(master);
        noise.start(now);

    } catch (e) { /* silently fail */ }
}

// ── Textarea ──
const inp = document.getElementById('inp');
inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
});
inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        playKeyClick('enter');
        env();
    } else if (e.key === 'Backspace' || e.key === 'Delete') {
        playKeyClick('backspace');
    } else if (e.key.length === 1) {
        // Só toca em teclas de caractere (evita Shift, Ctrl, etc.)
        playKeyClick('normal');
    }
});

// Colar imagem do clipboard
inp.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
        if (item.type.startsWith('image/')) {
            const file = item.getAsFile();
            if (file) {
                selectedImage = file;
                const reader = new FileReader();
                reader.onload = ev => {
                    document.getElementById('img-preview').src = ev.target.result;
                    document.getElementById('img-preview').classList.add('visible');
                    document.getElementById('img-remove').classList.add('visible');
                };
                reader.readAsDataURL(file);
            }
        }
    }
});

// ===========================================
// GRAVAÇÃO DE ÁUDIO + TRANSCRIÇÃO WHISPER
// ===========================================
let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;

async function toggleRecording() {
    if (isRecording) {
        // Para gravação
        mediaRecorder.stop();
        return;
    }

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks  = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });

        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };

        mediaRecorder.onstop = async () => {
            isRecording = false;
            const btn   = document.getElementById('audio-btn');
            btn.classList.remove('recording');
            stream.getTracks().forEach(t => t.stop());

            // Converte para blob e envia para transcrição
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            await transcribeAudio(blob);
        };

        mediaRecorder.start();
        isRecording = true;
        document.getElementById('audio-btn').classList.add('recording');
        showToast('🎙️ Gravando... toque novamente para parar');

    } catch (err) {
        showToast('Microfone não disponível');
    }
}

async function transcribeAudio(blob) {
    if (!cid) return;
    document.getElementById('typing').classList.add('visible');
    document.getElementById('send-btn').disabled = true;

    try {
        const form = new FormData();
        form.append('audio', blob, 'audio.webm');
        form.append('conversa_id', cid);

        const res = await fetch('/transcrever', { method: 'POST', body: form });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const d = await res.json();

        if (d.error) { showToast(d.error); return; }

        // Coloca o texto transcrito no input
        if (d.texto) {
            const inp = document.getElementById('inp');
            inp.value = d.texto;
            inp.style.height = 'auto';
            inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
            inp.focus();
        }

        // Se já tiver resposta direta, exibe
        if (d.resposta) {
            addMsg(d.texto || '[áudio]', 'user');
            addMsgTypewriter(d.resposta, 'assistant');
            carregar();
        }

    } catch {
        showToast('Erro ao transcrever áudio');
    } finally {
        document.getElementById('typing').classList.remove('visible');
        document.getElementById('send-btn').disabled = false;
    }
}

// ── Toast ──
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Init ──
window.addEventListener('load', () => { carregar(); nova(); });

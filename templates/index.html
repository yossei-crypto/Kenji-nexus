<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kenji IA | Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --a: #00ff88; --b: #050508; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--b); color: #fff; font-family: monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px; border-bottom: 1px solid var(--a); display: flex; justify-content: space-between; align-items: center; background: #000; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 90%; padding: 12px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-end; background: #111; border: 1px solid #333; }
        .ai { align-self: flex-start; border-left: 2px solid var(--a); width: 100%; background: rgba(0,255,136,0.02); }
        pre { background: #000; padding: 30px 10px 10px; border: 1px solid #222; overflow-x: auto; position: relative; margin: 10px 0; border-radius: 8px; }
        .copy { position: absolute; top: 5px; right: 5px; background: var(--a); color: #000; border: none; padding: 4px 8px; font-size: 10px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .in-zone { padding: 15px; background: #000; display: flex; gap: 10px; }
        input { flex: 1; background: #050505; border: 1px solid var(--a); color: #fff; padding: 12px; border-radius: 20px; outline: none; }
        #sb { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: #000; z-index: 100; transform: translateX(-100%); transition: 0.3s; border-right: 1px solid var(--a); }
        #sb.open { transform: translateX(0); }
    </style>
</head>
<body>
    <div id="sb" onclick="this.classList.remove('open')">
        <div style="padding:25px" onclick="event.stopPropagation()">
            <button onclick="nova()" style="width:100%; padding:12px; background:var(--a); border:none; font-weight:bold; border-radius:8px;">+ NOVA MISSÃO</button>
            <div id="hist" style="margin-top:20px"></div>
        </div>
    </div>
    <header>
        <button onclick="document.getElementById('sb').classList.toggle('open')" style="background:none; border:none; color:var(--a); font-size:24px;">☰</button>
        <div style="font-weight:bold; color:var(--a);">KENJI IA</div>
        <a href="https://instagram.com/cybernmap" target="_blank" style="color:var(--a); text-decoration:none; font-size:10px;">@cybernmap</a>
    </header>
    <div id="chat"></div>
    <div class="in-zone">
        <input type="text" id="inp" placeholder="Aguardando comando..." autocomplete="off">
        <button onclick="env()" style="background:none; border:none; color:var(--a); font-size:24px;">➤</button>
    </div>
    <script>
        let cid = null, sx = 0;
        document.addEventListener('touchstart', e => sx = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].clientX - sx;
            if(dx > 100 && sx < 50) document.getElementById('sb').classList.add('open');
            if(dx < -100) document.getElementById('sb').classList.remove('open');
        });
        async function nova() {
            const res = await fetch('/nova_conversa', {method:'POST'});
            const d = await res.json(); cid = d.id;
            document.getElementById('chat').innerHTML = '';
            document.getElementById('sb').classList.remove('open');
            carregar();
        }
        async function carregar() {
            const res = await fetch('/carregar_conversas');
            const d = await res.json();
            document.getElementById('hist').innerHTML = d.map(c => `<div onclick="setChat('${c.id}')" style="padding:12px; color:#555; border-bottom:1px solid #111; cursor:pointer;">> ${c.titulo}</div>`).join('');
        }
        async function setChat(id) {
            cid = id; document.getElementById('sb').classList.remove('open');
            const res = await fetch(`/carregar_historico/${id}`);
            const msgs = await res.json();
            document.getElementById('chat').innerHTML = '';
            msgs.forEach(m => add(m.content, m.role));
        }
        function add(t, r) {
            const b = document.getElementById('chat'), d = document.createElement('div');
            d.className = `msg ${r === 'user' ? 'user' : 'ai'}`;
            d.innerHTML = r === 'assistant' ? marked.parse(t) : t;
            b.appendChild(d); b.scrollTop = b.scrollHeight;
            d.querySelectorAll('pre').forEach(p => {
                const btn = document.createElement('button'); btn.className = 'copy'; btn.innerText = 'COPIAR';
                btn.onclick = () => { navigator.clipboard.writeText(p.innerText.replace('COPIAR','')); btn.innerText = 'OK!'; setTimeout(()=>btn.innerText='COPIAR',2000); };
                p.appendChild(btn);
            });
        }
        async function env() {
            const i = document.getElementById('inp'), v = i.value.trim();
            if(!v || !cid) return; i.value = ''; add(v, 'user');
            const res = await fetch('/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mensagem:v, conversa_id:cid})});
            const d = await res.json(); add(d.resposta, 'assistant');
        }
        document.getElementById('inp').onkeypress = (e) => e.key === 'Enter' && env();
        window.onload = () => { carregar(); nova(); };
    </script>
</body>
</html>

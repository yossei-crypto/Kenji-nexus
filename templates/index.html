<!DOCTYPE html>
<html lang="pt-PT" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kenji Nexus</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --panel: #111; --accent: #00e5ff; --text: #fff; --border: #222; }
        [data-theme="light"] { --bg: #f5f5f5; --panel: #fff; --accent: #008ba3; --text: #1a1a1a; --border: #ccc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; transition: 0.2s; }
        body { background: var(--bg); color: var(--text); height: 100dvh; display: flex; overflow: hidden; }
        #sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #main { flex: 1; display: flex; flex-direction: column; }
        header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 15px; line-height: 1.5; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: #222; color: #fff; }
        .ai { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); width: 100%; }
        pre { background: #000; padding: 15px; border-radius: 8px; position: relative; overflow-x: auto; margin: 10px 0; }
        code { color: var(--accent); }
        .copy-btn { position: absolute; top: 5px; right: 5px; background: #333; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; }
        .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid #222;">
            <button onclick="novaMissao()" style="width:100%; padding:10px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; font-weight:bold;">+ NOVA MISSÃO</button>
            <button onclick="toggleTheme()" style="width:100%; margin-top:10px; padding:5px; background:var(--panel); border:1px solid var(--border); color:var(--text); cursor:pointer; font-size:0.7rem;">Mudar Tema</button>
        </div>
        <div id="historico" style="flex:1; overflow-y:auto; padding:10px;"></div>
    </div>
    <div id="main">
        <header>
            <div style="font-weight: 800; color: var(--accent);">KENJI NEXUS</div>
            <div style="display:flex; gap:15px; align-items:center;">
                <a href="https://instagram.com/cybernmap" target="_blank" style="color:var(--accent); text-decoration:none; font-size:0.8rem; font-weight:bold;">@cybernmap</a>
                <button onclick="location.href='/logout'" style="background:none; border:none; color:#ff5f56; cursor:pointer; font-weight:bold;">Sair</button>
            </div>
        </header>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Comando tático..." autocomplete="off">
            <button onclick="enviar()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:25px; cursor:pointer; font-weight:bold;">➤</button>
        </div>
    </div>
    <script>
        let convId = null;
        function toggleTheme() {
            const h = document.documentElement;
            h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }
        async function carregarSidebar() {
            const res = await fetch('/carregar_conversas');
            const data = await res.json();
            const div = document.getElementById('historico');
            div.innerHTML = '';
            data.forEach(c => {
                const item = document.createElement('div');
                item.style = "padding:12px; cursor:pointer; border-radius:8px; margin-bottom:5px; font-size:0.8rem; color:#aaa;";
                item.innerText = c.titulo;
                item.onclick = () => carregarChat(c.id);
                div.appendChild(item);
            });
        }
        async function novaMissao() {
            const res = await fetch('/nova_conversa', {method: 'POST'});
            const data = await res.json();
            convId = data.id;
            carregarSidebar();
            document.getElementById('chat-box').innerHTML = '';
        }
        async function carregarChat(id) {
            convId = id;
            const res = await fetch(`/carregar_historico/${id}`);
            const msgs = await res.json();
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            msgs.forEach(m => addBubble(m.content, m.role));
        }
        function addBubble(txt, role, tempId = null) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            if(tempId) div.id = tempId;
            div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
            div.innerHTML = role === 'assistant' ? marked.parse(txt) : txt;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            setupCopy();
        }
        async function enviar() {
            const inp = document.getElementById('user-input');
            const val = inp.value.trim();
            if(!val || !convId) return;
            inp.value = '';
            addBubble(val, 'user');
            const tId = "loading-" + Date.now();
            addBubble("<i>A processar tática...</i>", "assistant", tId);
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mensagem: val, conversa_id: convId})
            });
            const data = await res.json();
            document.getElementById(tId).remove();
            addBubble(data.resposta, 'assistant');
            carregarSidebar();
        }
        function setupCopy() {
            document.querySelectorAll('pre').forEach(pre => {
                if (pre.querySelector('.copy-btn')) return;
                const btn = document.createElement('button');
                btn.className = 'copy-btn'; btn.innerText = 'Copiar';
                btn.onclick = () => {
                    navigator.clipboard.writeText(pre.innerText.replace('Copiar', ''));
                    btn.innerText = '✅'; setTimeout(() => btn.innerText = 'Copiar', 2000);
                };
                pre.appendChild(btn);
            });
        }
        document.getElementById('user-input').onkeypress = (e) => e.key === 'Enter' && enviar();
        window.onload = () => { carregarSidebar(); novaMissao(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kenji IA | Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --green: #00ff88;
            --green-dim: rgba(0,255,136,0.12);
            --green-glow: rgba(0,255,136,0.35);
            --bg: #03030a;
            --bg2: #07070f;
            --surface: #0c0c18;
            --border: rgba(0,255,136,0.18);
            --border-strong: rgba(0,255,136,0.45);
            --text: #c8c8d8;
            --text-dim: #55556a;
            --red: #ff4466;
            --sidebar-w: 290px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100dvh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Noise overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 999;
            opacity: 0.4;
        }

        /* ── LAYOUT ── */
        #app { display: flex; height: 100dvh; }

        /* ── SIDEBAR ── */
        #sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: var(--sidebar-w);
            background: var(--bg2);
            border-right: 1px solid var(--border);
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }
        #sidebar.open { transform: translateX(0); }

        #sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #sidebar-header .logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 16px;
            color: var(--green);
            letter-spacing: 4px;
        }

        #btn-nova {
            margin: 16px;
            padding: 12px 16px;
            background: var(--green-dim);
            border: 1px solid var(--border-strong);
            color: var(--green);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #btn-nova:hover {
            background: rgba(0,255,136,0.2);
            box-shadow: 0 0 16px var(--green-glow);
        }
        #btn-nova::before { content: '+'; font-size: 18px; }

        #hist {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        #hist::-webkit-scrollbar { width: 4px; }
        #hist::-webkit-scrollbar-track { background: transparent; }
        #hist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .hist-item {
            padding: 11px 20px;
            color: var(--text-dim);
            font-size: 11px;
            letter-spacing: 0.5px;
            cursor: pointer;
            border-left: 2px solid transparent;
            transition: all 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .hist-item:hover {
            color: var(--green);
            border-left-color: var(--green);
            background: var(--green-dim);
        }
        .hist-item.active {
            color: var(--green);
            border-left-color: var(--green);
            background: var(--green-dim);
        }
        .hist-item::before { content: '> '; color: var(--green); opacity: 0.4; }

        #sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            font-size: 10px;
            color: var(--text-dim);
        }

        /* ── OVERLAY ── */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            z-index: 199;
            display: none;
            opacity: 0;
            transition: opacity 0.28s;
        }
        #overlay.visible { display: block; opacity: 1; }

        /* ── MAIN ── */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100dvh;
        }

        /* ── HEADER ── */
        header {
            padding: 0 20px;
            height: 56px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg2);
            flex-shrink: 0;
            position: relative;
        }

        #menu-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--green);
            width: 36px; height: 36px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        #menu-btn:hover { background: var(--green-dim); border-color: var(--green); }

        .header-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 15px;
            color: var(--green);
            letter-spacing: 5px;
            flex: 1;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .header-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 1px;
            transition: color 0.2s;
            padding: 6px 10px;
            border: 1px solid transparent;
            border-radius: 4px;
        }
        .header-link:hover { color: var(--green); border-color: var(--border); }

        /* ── CHAT ── */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 0;
            scroll-behavior: smooth;
        }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* Welcome screen */
        #welcome {
            margin: auto;
            text-align: center;
            padding: 40px 20px;
            animation: fadeUp 0.5s ease;
        }
        #welcome .big { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; color: var(--green); letter-spacing: 8px; line-height: 1; }
        #welcome .sub { font-size: 11px; color: var(--text-dim); letter-spacing: 3px; margin-top: 10px; }
        #welcome .prompt { font-size: 11px; color: var(--text-dim); margin-top: 40px; letter-spacing: 1px; }
        #welcome .prompt span { color: var(--green); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Messages */
        .msg-wrap {
            display: flex;
            flex-direction: column;
            margin-bottom: 4px;
            animation: msgIn 0.2s ease;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-wrap.user { align-items: flex-end; margin-bottom: 16px; }
        .msg-wrap.ai { align-items: flex-start; margin-bottom: 16px; }

        .msg-meta {
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 5px;
            padding: 0 4px;
        }
        .msg-wrap.user .msg-meta { color: rgba(0,255,136,0.35); }

        .msg {
            max-width: min(88%, 720px);
            padding: 13px 16px;
            font-size: 13px;
            line-height: 1.65;
            border-radius: 10px;
        }

        .msg-wrap.user .msg {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.07);
            color: #ddd;
            border-radius: 10px 10px 2px 10px;
        }

        .msg-wrap.ai .msg {
            background: rgba(0,255,136,0.03);
            border-left: 2px solid var(--green);
            border-radius: 0 10px 10px 10px;
            width: 100%;
            max-width: 100%;
        }

        /* Markdown inside AI messages */
        .msg p { margin-bottom: 10px; }
        .msg p:last-child { margin-bottom: 0; }
        .msg h1, .msg h2, .msg h3 { font-family: 'Syne', sans-serif; color: var(--green); margin: 16px 0 8px; }
        .msg h1 { font-size: 18px; } .msg h2 { font-size: 15px; } .msg h3 { font-size: 13px; }
        .msg strong { color: #fff; }
        .msg em { color: var(--text); font-style: italic; }
        .msg a { color: var(--green); }
        .msg ul, .msg ol { padding-left: 20px; margin: 8px 0; }
        .msg li { margin-bottom: 4px; }
        .msg code:not(pre code) {
            background: rgba(0,255,136,0.1);
            color: var(--green);
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 12px;
        }
        .msg pre {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            position: relative;
        }
        .msg pre code {
            display: block;
            padding: 14px 14px 14px 14px;
            font-size: 12px;
            color: #a8e6c8;
            line-height: 1.6;
        }
        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background: rgba(0,255,136,0.05);
            border-bottom: 1px solid var(--border);
            border-radius: 8px 8px 0 0;
        }
        .code-lang { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
        .copy-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 3px 10px;
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
        }
        .copy-btn:hover { color: var(--green); border-color: var(--green); }
        .copy-btn.ok { color: var(--green); border-color: var(--green); }

        /* Typing indicator */
        #typing {
            display: none;
            align-items: center;
            gap: 5px;
            padding: 10px 14px;
            font-size: 11px;
            color: var(--text-dim);
        }
        #typing.visible { display: flex; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: bounce 1.1s infinite; }
        .dot:nth-child(2) { animation-delay: 0.18s; }
        .dot:nth-child(3) { animation-delay: 0.36s; }
        @keyframes bounce { 0%,80%,100% { transform: scale(0.5); opacity:0.3; } 40% { transform: scale(1); opacity:1; } }

        /* ── INPUT ZONE ── */
        #input-zone {
            padding: 12px 16px;
            background: var(--bg2);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        #input-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #input-row:focus-within {
            border-color: var(--border-strong);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.07);
        }

        #inp {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            max-height: 120px;
            overflow-y: auto;
            padding: 0;
        }
        #inp::placeholder { color: var(--text-dim); }
        #inp::-webkit-scrollbar { width: 3px; }
        #inp::-webkit-scrollbar-thumb { background: var(--border); }

        #send-btn {
            flex-shrink: 0;
            width: 34px; height: 34px;
            background: var(--green);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            font-weight: bold;
        }
        #send-btn:hover { box-shadow: 0 0 16px var(--green-glow); transform: scale(1.05); }
        #send-btn:active { transform: scale(0.95); }
        #send-btn:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }

        #char-hint {
            text-align: right;
            font-size: 9px;
            color: var(--text-dim);
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        /* ── ERROR TOAST ── */
        #toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a0a0f;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 12px;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 500;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── SCAN LINE ── */
        @keyframes scanline {
            0% { top: -10%; }
            100% { top: 110%; }
        }
        body::after {
            content: '';
            position: fixed;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(transparent, rgba(0,255,136,0.04), transparent);
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: 998;
        }

        /* ── SCROLLBAR GLOBAL ── */
        * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    </style>
</head>
<body>

<!-- Sidebar overlay -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<div id="sidebar">
    <div id="sidebar-header">
        <div class="logo-text">KENJI IA</div>
    </div>
    <button id="btn-nova" onclick="nova()">Nova Missão</button>
    <div id="hist"></div>
    <div id="sidebar-footer">
        <a href="https://instagram.com/cybernmap" target="_blank" style="color:var(--green); text-decoration:none;">@cybernmap</a>
        &nbsp;·&nbsp; v2.0
    </div>
</div>

<!-- Main -->
<div id="main">
    <header>
        <button id="menu-btn" onclick="toggleSidebar()" aria-label="Menu">☰</button>
        <div class="header-title">KENJI IA</div>
        <div class="header-status">
            <div class="status-dot"></div>
            <span>ONLINE</span>
        </div>
        <a href="https://instagram.com/cybernmap" target="_blank" class="header-link">@cybernmap</a>
    </header>

    <div id="chat">
        <div id="welcome">
            <div class="big">KENJI</div>
            <div class="sub">SISTEMA OPERACIONAL IA</div>
            <div class="prompt">Aguardando <span>// comando</span> _</div>
        </div>
    </div>

    <div id="typing">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <span style="font-size:10px; letter-spacing:1px; margin-left:4px;">processando...</span>
    </div>

    <div id="input-zone">
        <div id="input-row">
            <textarea id="inp" placeholder="Aguardando comando..." rows="1" autocomplete="off"></textarea>
            <button id="send-btn" onclick="env()" aria-label="Enviar">➤</button>
        </div>
        <div id="char-hint">Enter para enviar · Shift+Enter para nova linha</div>
    </div>
</div>

<div id="toast"></div>

<script>
    let cid = null;
    let isLoading = false;

    // ── Sidebar ──
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('overlay');
        const isOpen = sb.classList.contains('open');
        sb.classList.toggle('open', !isOpen);
        ov.classList.toggle('visible', !isOpen);
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('visible');
    }

    // Swipe to open sidebar
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    document.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (dx > 80 && touchStartX < 40) toggleSidebar();
        if (dx < -80) closeSidebar();
    }, { passive: true });

    // ── API Calls ──
    async function fetchJSON(url, opts = {}) {
        const res = await fetch(url, opts);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    }

    async function nova() {
        try {
            const d = await fetchJSON('/nova_conversa', { method: 'POST' });
            cid = d.id;
            document.getElementById('chat').innerHTML = '<div id="welcome"><div class="big">KENJI</div><div class="sub">SISTEMA OPERACIONAL IA</div><div class="prompt">Aguardando <span>// comando</span> _</div></div>';
            closeSidebar();
            carregar();
        } catch (e) { showToast('Erro ao criar conversa'); }
    }

    async function carregar() {
        try {
            const d = await fetchJSON('/carregar_conversas');
            const hist = document.getElementById('hist');
            if (!d.length) {
                hist.innerHTML = '<div style="padding:16px 20px; font-size:10px; color:var(--text-dim);">Nenhuma missão anterior</div>';
                return;
            }
            hist.innerHTML = d.map(c =>
                `<div class="hist-item ${c.id === cid ? 'active' : ''}" onclick="setChat('${c.id}')">${esc(c.titulo)}</div>`
            ).join('');
        } catch (e) { /* silently fail */ }
    }

    async function setChat(id) {
        try {
            cid = id;
            closeSidebar();
            const msgs = await fetchJSON(`/carregar_historico/${id}`);
            const chat = document.getElementById('chat');
            chat.innerHTML = '';
            msgs.forEach(m => addMsg(m.content, m.role));
            carregar();
        } catch (e) { showToast('Erro ao carregar histórico'); }
    }

    // ── Message Rendering ──
    function esc(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function timeStr() {
        return new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
    }

    function addMsg(text, role) {
        const chat = document.getElementById('chat');

        // Remove welcome screen on first message
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();

        const wrap = document.createElement('div');
        wrap.className = `msg-wrap ${role === 'user' ? 'user' : 'ai'}`;

        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        meta.textContent = (role === 'user' ? 'VOCÊ' : 'KENJI') + ' · ' + timeStr();

        const msg = document.createElement('div');
        msg.className = 'msg';

        if (role === 'assistant') {
            msg.innerHTML = marked.parse(text);
            // Add copy buttons to code blocks
            msg.querySelectorAll('pre').forEach(pre => {
                const code = pre.querySelector('code');
                const lang = (code?.className.match(/language-(\w+)/) || [])[1] || 'código';
                const header = document.createElement('div');
                header.className = 'code-header';
                header.innerHTML = `<span class="code-lang">${lang.toUpperCase()}</span>`;
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'COPIAR';
                btn.onclick = () => {
                    const src = (code || pre).innerText.trim();
                    navigator.clipboard.writeText(src).then(() => {
                        btn.textContent = '✓ OK';
                        btn.classList.add('ok');
                        setTimeout(() => { btn.textContent = 'COPIAR'; btn.classList.remove('ok'); }, 2000);
                    });
                };
                header.appendChild(btn);
                pre.insertBefore(header, pre.firstChild);
            });
        } else {
            msg.textContent = text;
        }

        wrap.appendChild(meta);
        wrap.appendChild(msg);
        chat.appendChild(wrap);
        chat.scrollTop = chat.scrollHeight;
    }

    // ── Send ──
    async function env() {
        const inp = document.getElementById('inp');
        const text = inp.value.trim();
        if (!text || !cid || isLoading) return;

        isLoading = true;
        inp.value = '';
        inp.style.height = 'auto';
        document.getElementById('send-btn').disabled = true;
        document.getElementById('typing').classList.add('visible');

        addMsg(text, 'user');

        try {
            const d = await fetchJSON('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensagem: text, conversa_id: cid })
            });
            document.getElementById('typing').classList.remove('visible');
            addMsg(d.resposta, 'assistant');
            carregar(); // refresh titles
        } catch (e) {
            document.getElementById('typing').classList.remove('visible');
            showToast('Erro ao enviar mensagem');
        } finally {
            isLoading = false;
            document.getElementById('send-btn').disabled = false;
            inp.focus();
        }
    }

    // ── Auto-resize textarea ──
    const inp = document.getElementById('inp');
    inp.addEventListener('input', () => {
        inp.style.height = 'auto';
        inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
    });
    inp.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            env();
        }
    });

    // ── Toast ──
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── Init ──
    window.addEventListener('load', () => {
        carregar();
        nova();
    });
</script>
</body>
</html>

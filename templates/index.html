<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kenji IA | Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --a: #00e5ff; --b: #050505; --p: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; width: 100%; overflow: hidden; 
            background: var(--b); font-family: 'JetBrains Mono', monospace;
            position: fixed; color: #fff;
        }

        /* HEADER */
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--a);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 100; backdrop-filter: blur(10px);
        }

        .brand { font-weight: 900; color: var(--a); text-transform: uppercase; letter-spacing: 2px; font-size: 1.1rem; }

        /* SIDEBAR */
        #sb {
            position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
            background: #000; z-index: 300; transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--a); box-shadow: 20px 0 50px rgba(0,0,0,0.8);
        }
        #sb.open { transform: translateX(0); }

        /* OVERLAY PARA O SWIPE */
        #ov {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: none; z-index: 250; opacity: 0; transition: 0.3s;
        }
        #ov.active { display: block; opacity: 1; }

        /* ÁREA DE CHAT */
        #chat-wrapper {
            position: absolute; top: 60px; bottom: 85px; left: 0; right: 0;
            overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }

        .msg { max-width: 90%; padding: 14px; border-radius: 10px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-end; background: #1a1a1a; border: 1px solid #333; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; border-left: 2px solid var(--a); width: 100%; background: rgba(0,229,255,0.02); }

        /* BLOCOS DE CÓDIGO COM BOTÃO */
        pre {
            background: #000; padding: 35px 12px 12px; border-radius: 6px; 
            margin: 15px 0; overflow-x: auto; border: 1px solid #222; position: relative;
            max-width: 100%; white-space: pre-wrap;
        }
        .copy-btn {
            position: absolute; top: 8px; right: 8px; background: var(--a);
            color: #000; border: none; padding: 5px 10px; border-radius: 4px;
            font-size: 10px; font-weight: bold; cursor: pointer; z-index: 10;
        }

        /* INPUT AREA */
        .input-zone {
            position: fixed; bottom: 0; left: 0; right: 0; height: 85px;
            background: #000; border-top: 1px solid #1a1a1a; padding: 15px;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .input-shell {
            background: #0d0d0d; border: 1px solid var(--a); border-radius: 25px;
            display: flex; align-items: center; padding: 0 18px; height: 100%;
        }
        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; }
        .send-btn { color: var(--a); font-size: 24px; cursor: pointer; background: none; border: none; }

        .hist-item { padding: 15px; border-bottom: 1px solid #111; color: #666; font-size: 13px; cursor: pointer; }
        .hist-item:active { background: #0a0a0a; color: var(--a); }
    </style>
</head>
<body>

    <div id="ov" onclick="toggleSidebar()"></div>

    <div id="sb">
        <div style="padding: 25px;">
            <button onclick="novaMissao()" style="width:100%; padding:14px; background:var(--a); color:#000; border:none; border-radius:8px; font-weight:bold; letter-spacing:1px;">+ NOVA MISSÃO</button>
            <div id="historico" style="margin-top:20px;"></div>
        </div>
    </div>

    <header>
        <button onclick="toggleSidebar()" style="background:none; border:none; color:var(--a); font-size:26px;">☰</button>
        <div class="brand">Kenji IA</div>
        <a href="https://instagram.com/cybernmap" target="_blank" style="color:var(--a); text-decoration:none; font-size:11px; font-weight:bold;">@cybernmap</a>
        <button onclick="location.href='/logout'" style="background:none; border:1px solid #ff3e3e; color:#ff3e3e; padding:5px 12px; border-radius:5px; font-size:10px; font-weight:bold;">SAIR</button>
    </header>

    <div id="chat-wrapper"></div>

    <div class="input-zone">
        <div class="input-shell">
            <input type="text" id="user-input" placeholder="Aguardando comando..." autocomplete="off">
            <button class="send-btn" onclick="enviar()">➤</button>
        </div>
    </div>

    <script>
        let convId = null;
        let touchStartX = 0;
        let touchStartY = 0;

        function toggleSidebar() {
            document.getElementById('sb').classList.toggle('open');
            document.getElementById('ov').classList.toggle('active');
        }

        // SISTEMA DE GESTOS APRIMORADO
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, false);

        document.addEventListener('touchend', e => {
            let diffX = e.changedTouches[0].screenX - touchStartX;
            let diffY = e.changedTouches[0].screenY - touchStartY;
            
            // Verifica se o movimento foi mais horizontal que vertical
            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Puxar da esquerda para a direita (Abrir)
                if (diffX > 80 && touchStartX < 50) {
                    if (!document.getElementById('sb').classList.contains('open')) toggleSidebar();
                }
                // Puxar da direita para a esquerda (Fechar)
                if (diffX < -80) {
                    if (document.getElementById('sb').classList.contains('open')) toggleSidebar();
                }
            }
        }, false);

        async function carregarSidebar() {
            const res = await fetch('/carregar_conversas');
            const data = await res.json();
            document.getElementById('historico').innerHTML = data.map(c => `
                <div class="hist-item" onclick="carregarChat('${c.id}')">
                    > ${c.titulo}
                </div>
            `).join('');
        }

        async function novaMissao() {
            const res = await fetch('/nova_conversa', {method: 'POST'});
            const data = await res.json();
            convId = data.id;
            document.getElementById('chat-wrapper').innerHTML = '';
            if(document.getElementById('sb').classList.contains('open')) toggleSidebar();
            carregarSidebar();
        }

        async function carregarChat(id) {
            convId = id;
            if(document.getElementById('sb').classList.contains('open')) toggleSidebar();
            const res = await fetch(`/carregar_historico/${id}`);
            const msgs = await res.json();
            const box = document.getElementById('chat-wrapper');
            box.innerHTML = '';
            msgs.forEach(m => addBubble(m.content, m.role));
            carregarSidebar();
        }

        function addBubble(txt, role) {
            const box = document.getElementById('chat-wrapper');
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
            div.innerHTML = role === 'assistant' ? marked.parse(txt) : txt;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            
            // Adiciona botões de cópia em novos blocos de código
            div.querySelectorAll('pre').forEach(pre => {
                if (!pre.querySelector('.copy-btn')) {
                    const btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.innerText = 'COPIAR';
                    btn.onclick = () => {
                        const code = pre.innerText.replace('COPIAR', '');
                        navigator.clipboard.writeText(code);
                        btn.innerText = 'OK!';
                        setTimeout(() => btn.innerText = 'COPIAR', 2000);
                    };
                    pre.appendChild(btn);
                }
            });
        }

        async function enviar() {
            const inp = document.getElementById('user-input');
            const val = inp.value.trim();
            if(!val || !convId) return;
            inp.value = '';
            addBubble(val, 'user');
            
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mensagem: val, conversa_id: convId})
            });
            const data = await res.json();
            addBubble(data.resposta, 'assistant');
        }

        document.getElementById('user-input').onkeypress = (e) => e.key === 'Enter' && enviar();
        window.onload = () => { carregarSidebar(); novaMissao(); };
    </script>
</body>
</html>

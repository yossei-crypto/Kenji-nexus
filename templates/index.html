<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kenji Nexus | Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #050505; --accent: #00e5ff; --panel: #0a0a0a; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; width: 100%; overflow: hidden; 
            background: var(--bg); font-family: 'Inter', sans-serif;
            position: fixed;
        }

        /* EFEITO GLITCH NO NOME */
        .glitch {
            font-weight: 900; font-size: 1.2rem; color: var(--accent);
            letter-spacing: 3px; position: relative; text-transform: uppercase;
            animation: glitch-anim 3s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { text-shadow: 2px 0 red, -2px 0 blue; transform: skew(0deg); }
            5% { text-shadow: -2px 0 red, 2px 0 blue; transform: skew(1deg); }
            10% { text-shadow: 2px 0 red, -2px 0 blue; transform: skew(0deg); }
            100% { text-shadow: none; transform: skew(0deg); }
        }

        header {
            position: fixed; top: 0; left: 0; right: 0; height: 65px;
            background: rgba(0,0,0,0.9); border-bottom: 1px solid #1a1a1a;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 100; backdrop-filter: blur(10px);
        }

        #sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
            background: #000; z-index: 200; transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            border-right: 1px solid #1a1a1a; display: flex; flex-direction: column;
        }
        #sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.8); }

        /* ÁREA DE CHAT */
        #chat-wrapper {
            position: absolute; top: 65px; bottom: 85px; left: 0; right: 0;
            overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 25px;
            scroll-behavior: smooth;
        }

        .msg { max-width: 85%; padding: 15px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
        .user { align-self: flex-end; background: #111; border: 1px solid #222; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; border-left: 2px solid var(--accent); width: 100%; background: rgba(0,229,255,0.02); }

        /* INPUT AREA */
        .input-zone {
            position: fixed; bottom: 0; left: 0; right: 0; height: 85px;
            background: #000; border-top: 1px solid #1a1a1a; padding: 15px;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .input-shell {
            background: #0d0d0d; border: 1px solid #222; border-radius: 15px;
            display: flex; align-items: center; padding: 0 15px; height: 100%;
        }
        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; }
        .send-btn { color: var(--accent); font-size: 22px; cursor: pointer; background: none; border: none; }

        /* OVERLAY PARA O SWIPE */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: none; z-index: 150; opacity: 0; transition: 0.3s;
        }
        #overlay.active { display: block; opacity: 1; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <div style="padding: 30px 20px; border-bottom: 1px solid #1a1a1a;">
            <button onclick="novaMissao()" style="width:100%; padding:15px; background:var(--accent); color:#000; border:none; border-radius:8px; font-weight:900;">+ NOVA MISSÃO</button>
        </div>
        <div id="historico" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div style="padding:20px; text-align:center; opacity:0.3; font-size:10px;">SISTEMA NEXUS v3.0</div>
    </div>

    <header>
        <button onclick="toggleSidebar()" style="background:none; border:none; color:var(--accent); font-size:26px;">☰</button>
        <div class="glitch">Kenji Nexus</div>
        <a href="https://instagram.com/cybernmap" target="_blank" style="color:var(--accent); text-decoration:none; font-size:12px; font-weight:bold;">@cybernmap</a>
        <button onclick="location.href='/logout'" style="background:none; border:1px solid #ff3e3e; color:#ff3e3e; padding:5px 12px; border-radius:5px; font-size:10px; font-weight:bold;">SAIR</button>
    </header>

    <div id="chat-wrapper"></div>

    <div class="input-zone">
        <div class="input-shell">
            <input type="text" id="user-input" placeholder="Aguardando comando..." autocomplete="off">
            <button class="send-btn" onclick="enviar()">➤</button>
        </div>
    </div>

    <script>
        let convId = null;
        let touchStartX = 0;

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.classList.toggle('open');
            ov.classList.toggle('active');
        }

        // DETECÇÃO DE SWIPE (ARRASTAR)
        document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        document.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchEndX - touchStartX > 80) toggleSidebar(); // Arrastar para direita abre
            if (touchStartX - touchEndX > 80) { // Arrastar para esquerda fecha
                if (document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
            }
        });

        async function carregarSidebar() {
            const res = await fetch('/carregar_conversas');
            const data = await res.json();
            const div = document.getElementById('historico');
            div.innerHTML = data.map(c => `
                <div onclick="carregarChat('${c.id}')" style="padding:15px; color:#666; border-bottom:1px solid #0a0a0a; font-size:13px;">
                    > ${c.titulo}
                </div>
            `).join('');
        }

        async function novaMissao() {
            const res = await fetch('/nova_conversa', {method: 'POST'});
            const data = await res.json();
            convId = data.id;
            document.getElementById('chat-wrapper').innerHTML = '';
            if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
            carregarSidebar();
        }

        async function carregarChat(id) {
            convId = id;
            if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
            const res = await fetch(`/carregar_historico/${id}`);
            const msgs = await res.json();
            const box = document.getElementById('chat-wrapper');
            box.innerHTML = '';
            msgs.forEach(m => addBubble(m.content, m.role));
            carregarSidebar();
        }

        function addBubble(txt, role, tId = null) {
            const box = document.getElementById('chat-wrapper');
            const div = document.createElement('div');
            if(tId) div.id = tId;
            div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
            div.innerHTML = role === 'assistant' ? marked.parse(txt) : txt;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function enviar() {
            const inp = document.getElementById('user-input');
            const val = inp.value.trim();
            if(!val || !convId) return;
            inp.value = '';
            addBubble(val, 'user');
            const tId = "L-" + Date.now();
            addBubble("<i>Sincronizando...</i>", "assistant", tId);
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mensagem: val, conversa_id: convId})
            });
            const data = await res.json();
            document.getElementById(tId).remove();
            addBubble(data.resposta, 'assistant');
        }

        document.getElementById('user-input').onkeypress = (e) => e.key === 'Enter' && enviar();
        window.onload = () => { carregarSidebar(); novaMissao(); };
    </script>
</body>
</html>

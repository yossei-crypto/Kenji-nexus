<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kenji Nexus | Elite Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #050505; --sidebar: #000; --accent: #00e5ff;
            --text: #ffffff; --msg-user: #1a1a1a; --msg-ai: rgba(0, 229, 255, 0.05);
        }
        [data-theme="light"] {
            --bg: #ffffff; --sidebar: #f0f0f0; --accent: #007c8f;
            --text: #1a1a1a; --msg-user: #e0e0e0; --msg-ai: #f9f9f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'JetBrains Mono', monospace; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); position: fixed; }

        /* ANIMAÇÃO DE GLITCH PROFISSIONAL */
        .glitch {
            font-weight: 900; color: var(--accent); letter-spacing: 2px;
            text-transform: uppercase; position: relative;
            animation: glitch 4s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            1% { transform: translate(-2px, 2px); }
            2% { transform: translate(2px, -2px); }
            3% { transform: translate(0); }
        }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%; height: 65px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--accent); display: flex;
            align-items: center; justify-content: space-between; padding: 0 15px; z-index: 100;
        }

        /* SIDEBAR ARRASTÁVEL */
        #sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
            background: var(--sidebar); z-index: 200; transform: translateX(-100%);
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); border-right: 1px solid var(--accent);
        }
        #sidebar.open { transform: translateX(0); box-shadow: 10px 0 50px rgba(0,0,0,0.9); }

        /* CHAT BOX */
        #chat-wrapper {
            position: absolute; top: 65px; bottom: 85px; left: 0; right: 0;
            overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px;
        }
        .msg { max-width: 85%; padding: 15px; border-radius: 12px; font-size: 14px; line-height: 1.6; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { align-self: flex-end; background: var(--msg-user); color: var(--text); border: 1px solid #333; }
        .ai { align-self: flex-start; background: var(--msg-ai); border: 1px solid var(--accent); color: var(--accent); width: 100%; }

        /* INPUT AREA */
        .input-zone {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: var(--bg); border-top: 1px solid #222; padding: 15px;
            display: flex; align-items: center;
        }
        .input-shell {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--accent);
            border-radius: 50px; display: flex; align-items: center; padding: 0 20px;
        }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; font-size: 16px; outline: none; }

        /* BOTÕES */
        .btn-tatico {
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px;
        }
        .btn-sair { border-color: #ff3e3e; color: #ff3e3e; width: auto; padding: 5px 10px; font-size: 10px; }
    </style>
</head>
<body id="body">

    <div id="sidebar">
        <div style="padding: 25px;">
            <button class="btn-tatico" onclick="novaMissao()">+ NOVA MISSÃO</button>
            <button class="btn-tatico" onclick="toggleTheme()" style="font-size: 10px;">🌓 ALTERNAR TEMA</button>
            <div id="historico" style="margin-top: 20px;"></div>
        </div>
    </div>

    <header>
        <button onclick="toggleSidebar()" style="background:none; border:none; color:var(--accent); font-size:28px;">☰</button>
        <div class="glitch">KENJI NEXUS</div>
        <a href="https://instagram.com/cybernmap" target="_blank" style="color:var(--accent); text-decoration:none; font-size:11px;">@cybernmap</a>
        <button class="btn-tatico btn-sair" onclick="location.href='/logout'">SAIR</button>
    </header>

    <div id="chat-wrapper"></div>

    <div class="input-zone">
        <div class="input-shell">
            <input type="text" id="user-input" placeholder="Aguardando comando..." autocomplete="off">
            <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:22px;">➤</button>
        </div>
    </div>

    <script>
        let convId = null;
        let startX = 0;

        // TEMA
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
        }

        // SIDEBAR & SWIPE
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        
        document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            let diff = e.changedTouches[0].clientX - startX;
            if (diff > 100) document.getElementById('sidebar').classList.add('open');
            if (diff < -100) document.getElementById('sidebar').classList.remove('open');
        });

        async function carregarSidebar() {
            const res = await fetch('/carregar_conversas');
            const data = await res.json();
            const div = document.getElementById('historico');
            div.innerHTML = data.map(c => `
                <div onclick="carregarChat('${c.id}')" style="padding:12px; color:#666; border-bottom:1px solid #111; font-size:12px; cursor:pointer;">
                    [${c.id}] ${c.titulo}
                </div>
            `).join('');
        }

        async function novaMissao() {
            const res = await fetch('/nova_conversa', {method: 'POST'});
            const data = await res.json();
            convId = data.id;
            document.getElementById('chat-wrapper').innerHTML = '';
            toggleSidebar();
            carregarSidebar();
        }

        async function carregarChat(id) {
            convId = id;
            toggleSidebar();
            const res = await fetch(`/carregar_historico/${id}`);
            const msgs = await res.json();
            const box = document.getElementById('chat-wrapper');
            box.innerHTML = '';
            msgs.forEach(m => addBubble(m.content, m.role));
        }

        function addBubble(txt, role, tId = null) {
            const box = document.getElementById('chat-wrapper');
            const div = document.createElement('div');
            if(tId) div.id = tId;
            div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
            div.innerHTML = role === 'assistant' ? marked.parse(txt) : txt;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function enviar() {
            const inp = document.getElementById('user-input');
            const val = inp.value.trim();
            if(!val || !convId) return;
            inp.value = '';
            addBubble(val, 'user');
            const tId = "L-" + Date.now();
            addBubble("<i>Sincronizando...</i>", "assistant", tId);
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mensagem: val, conversa_id: convId})
            });
            const data = await res.json();
            document.getElementById(tId).remove();
            addBubble(data.resposta, 'assistant');
        }

        document.getElementById('user-input').onkeypress = (e) => e.key === 'Enter' && enviar();
        window.onload = () => { carregarSidebar(); novaMissao(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kenji Nexus | Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --sidebar-bg: #000000;
            --panel-bg: rgba(15, 15, 15, 0.95);
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.3);
            --text: #e0e0e0;
            --border: #1a1a1a;
            --user-bubble: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100dvh; 
            width: 100vw;
            display: flex; 
            overflow: hidden; 
        }

        /* BARRA LATERAL TÁTICA */
        #sidebar { 
            width: 280px; 
            background: var(--sidebar-bg); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid var(--border); }
        
        .new-chat-btn {
            width: 100%; 
            padding: 14px; 
            background: transparent; 
            border: 1px solid var(--accent);
            color: var(--accent); 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        #historico { flex: 1; overflow-y: auto; padding: 15px; }
        .conv-item { 
            padding: 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            color: #888; 
            margin-bottom: 8px;
            border: 1px solid transparent;
        }
        .conv-item:hover { background: #111; color: var(--text); }
        .ativa { 
            background: rgba(0, 229, 255, 0.05); 
            border-color: var(--accent); 
            color: var(--accent); 
            font-weight: bold;
        }

        /* ÁREA CENTRAL */
        #main-command { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: radial-gradient(circle at top right, #0a1114, #050505);
        }

        header { 
            height: 70px;
            padding: 0 25px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        .logo { font-weight: 800; letter-spacing: 3px; color: var(--accent); font-size: 1.2rem; }
        .user-tag { color: #555; font-size: 0.8rem; font-weight: bold; }

        /* CHAT FLUXO */
        #chat-wrapper { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 30px; }
        
        .message { max-width: 90%; line-height: 1.6; font-size: 0.95rem; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg { align-self: flex-end; background: var(--user-bubble); padding: 15px 20px; border-radius: 20px 20px 0 20px; color: #fff; border: 1px solid #333; }
        
        .ai-msg { align-self: flex-start; width: 100%; border-left: 2px solid var(--accent); padding-left: 20px; margin-bottom: 10px; }
        .ai-msg code { font-family: 'JetBrains Mono', monospace; color: var(--accent); background: #000; padding: 2px 6px; border-radius: 4px; }
        
        pre { 
            background: #000; 
            padding: 20px; 
            border-radius: 8px; 
            margin: 15px 0; 
            overflow-x: auto; 
            border: 1px solid var(--border);
            position: relative;
        }

        /* INPUT TÁTICO */
        .input-zone { padding: 30px 25px; background: transparent; }
        .input-shell { 
            max-width: 900px; 
            margin: 0 auto; 
            display: flex; 
            background: var(--panel-bg); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 10px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: #fff; 
            padding: 12px; 
            outline: none; 
            font-size: 1rem; 
        }
        .send-btn { 
            background: none; 
            border: none; 
            color: var(--accent); 
            font-size: 1.5rem; 
            cursor: pointer; 
            padding: 0 10px;
        }

        /* MOBILE FIX */
        @media (max-width: 768px) {
            #sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            .logo { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="novaMissao()">+ Nova Missão</button>
        </div>
        <div id="historico"></div>
        <div style="padding: 20px; border-top: 1px solid var(--border);">
            <button onclick="toggleTheme()" style="width: 100%; background: #111; color: #555; border: none; padding: 10px; border-radius: 4px; font-size: 0.7rem; cursor: pointer;">SISTEMA v2.0</button>
        </div>
    </div>

    <main id="main-command">
        <header>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="background:none; border:none; color:var(--accent); font-size: 1.5rem; cursor: pointer; display: block;">☰</button>
                <div class="logo">KENJI NEXUS</div>
            </div>
            <div style="display: flex; gap: 20px; align-items: center;">
                <span class="user-tag">@cybernmap</span>
                <button onclick="location.href='/logout'" style="color: #ff3e3e; background: none; border: 1px solid #ff3e3e33; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold;">SAIR</button>
            </div>
        </header>

        <div id="chat-wrapper">
            </div>

        <div class="input-zone">
            <div class="input-shell">
                <input type="text" id="user-input" placeholder="Aguardando comando..." autocomplete="off">
                <button class="send-btn" onclick="enviar()">➤</button>
            </div>
        </div>
    </main>

    <script>
        let convId = null;

        async function carregarSidebar() {
            const res = await fetch('/carregar_conversas');
            const data = await res.json();
            const div = document.getElementById('historico');
            div.innerHTML = '';
            data.forEach(c => {
                const item = document.createElement('div');
                item.className = `conv-item ${convId === c.id ? 'ativa' : ''}`;
                item.innerText = c.titulo;
                item.onclick = () => carregarChat(c.id);
                div.appendChild(item);
            });
        }

        async function novaMissao() {
            const res = await fetch('/nova_conversa', {method: 'POST'});
            const data = await res.json();
            convId = data.id;
            await carregarSidebar();
            carregarChat(data.id);
        }

        async function carregarChat(id) {
            convId = id;
            if (window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
            const res = await fetch(`/carregar_historico/${id}`);
            const msgs = await res.json();
            const box = document.getElementById('chat-wrapper');
            box.innerHTML = '';
            msgs.forEach(m => addBubble(m.content, m.role));
            carregarSidebar();
        }

        function addBubble(txt, role, tempId = null) {
            const box = document.getElementById('chat-wrapper');
            const div = document.createElement('div');
            if(tempId) div.id = tempId;
            div.className = `message ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            div.innerHTML = role === 'assistant' ? marked.parse(txt) : txt;
            box.appendChild(div);
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }

        async function enviar() {
            const inp = document.getElementById('user-input');
            const val = inp.value.trim();
            if(!val || !convId) return;
            inp.value = '';
            addBubble(val, 'user');

            const tId = "loading-" + Date.now();
            addBubble("<i>Sincronizando com Nexus...</i>", "assistant", tId);

            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mensagem: val, conversa_id: convId})
            });
            const data = await res.json();
            document.getElementById(tId).remove();
            addBubble(data.resposta, 'assistant');
        }

        document.getElementById('user-input').onkeypress = (e) => e.key === 'Enter' && enviar();
        window.onload = () => { carregarSidebar(); novaMissao(); };
    </script>
</body>
</html>

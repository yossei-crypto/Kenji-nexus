<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kenji IA | Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #050508; --surface: #0d0d12; --border: #1a1a25;
            --accent: #00ff88; --text: #e0e0e0; --text-dim: #777;
            --sidebar-w: 280px;
        }

        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            display: flex; height: 100dvh; width: 100vw; overflow: hidden; position: fixed;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; height: 100%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; position: absolute; left: 0; transform: translateX(-100%);
        }
        .sidebar.open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.8); }

        @media (min-width: 769px) {
            .sidebar { position: relative; transform: translateX(0); }
        }

        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid var(--border); text-align: center; }
        .sidebar-header h1 { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 1.3rem; letter-spacing: 2px; }
        .cybernmap-tag { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; margin-top: 5px; }

        .btn-nova {
            margin: 20px; padding: 12px; background: var(--accent); color: #000;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        .conv-list { flex: 1; overflow-y: auto; padding: 10px; }
        .conv-item { 
            padding: 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; color: var(--text-dim);
            margin-bottom: 5px; border: 1px solid transparent; 
        }
        .conv-item.active { background: rgba(0,255,136,0.05); color: var(--accent); border-color: var(--accent); }

        /* ── MAIN ── */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

        header {
            height: 65px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; z-index: 100;
        }

        .menu-btn { background: none; border: none; color: var(--accent); font-size: 1.5rem; cursor: pointer; }

        .messages-container {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px;
            scroll-behavior: smooth; padding-bottom: 100px;
        }

        .msg { max-width: 90%; padding: 15px; border-radius: 12px; font-size: 0.95rem; line-height: 1.6; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: #1a1a25; border: 1px solid #2a2a35; }
        .ai { align-self: flex-start; border-left: 2px solid var(--accent); width: 100%; background: rgba(0,255,136,0.02); }

        /* MARKDOWN FIXES */
        pre { background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 35px 15px 15px; margin: 15px 0; position: relative; overflow-x: auto; }
        code { font-family: 'JetBrains Mono', monospace; color: var(--accent); }
        .copy-btn { position: absolute; top: 8px; right: 8px; background: var(--accent); color: #000; border: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }

        /* INPUT AREA */
        .input-area {
            position: absolute; bottom: 0; width: 100%; padding: 20px;
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }
        .input-shell {
            max-width: 900px; margin: 0 auto; background: var(--surface);
            border: 1px solid var(--accent); border-radius: 30px; display: flex; padding: 5px 15px;
        }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-size: 1rem; }
        .btn-send { background: none; border: none; color: var(--accent); font-size: 1.5rem; cursor: pointer; }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 900; }
        #overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>KENJI IA</h1>
            <div class="cybernmap-tag">@cybernmap | NEURAL SYSTEM</div>
        </div>
        <button class="btn-nova" onclick="novaConversa()">+ NOVA MISSÃO</button>
        <div class="conv-list" id="convList"></div>
        <div style="padding: 15px;">
            <button onclick="location.href='/logout'" style="width:100%; padding:10px; background:none; border:1px solid #ff4444; color:#ff4444; border-radius:8px; cursor:pointer; font-weight:bold;">DESCONECTAR</button>
        </div>
    </aside>

    <main class="main">
        <header>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <div style="font-weight: bold; letter-spacing: 1px; color: var(--accent);">DASHBOARD</div>
            </div>
            <a href="https://instagram.com/cybernmap" target="_blank" style="color: var(--accent); text-decoration: none; font-size: 0.8rem; font-weight: bold;">@cybernmap</a>
        </header>

        <div class="messages-container" id="chatContainer">
            <div style="margin: auto; text-align: center; opacity: 0.3; font-size: 0.8rem;" id="welcome">
                <p>// INICIALIZANDO TERMINAL...</p>
                <p>AGUARDANDO COMANDO TÁTICO</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-shell">
                <input type="text" id="userInput" placeholder="Digite seu comando..." autocomplete="off">
                <button class="btn-send" onclick="enviar()">➤</button>
            </div>
        </div>
    </main>

    <script>
        let conversaAtiva = null;
        let startX = 0;

        // --- GESTOS (SWIPE) ---
        document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            let diff = e.changedTouches[0].clientX - startX;
            const sb = document.getElementById('sidebar');
            if (diff > 100 && startX < 50) toggleSidebar(); // Abrir
            if (diff < -100 && sb.classList.contains('open')) toggleSidebar(); // Fechar
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        // --- LÓGICA DE CHAT ---
        async function carregarConversas() {
            const res = await fetch('/carregar_conversas');
            const data = await res.json();
            const list = document.getElementById('convList');
            list.innerHTML = data.map(c => `
                <div class="conv-item ${conversaAtiva === c.id ? 'active' : ''}" onclick="selecionarChat('${c.id}')">
                    > ${c.titulo}
                </div>
            `).join('');
        }

        async function novaConversa() {
            const res = await fetch('/nova_conversa', {method: 'POST'});
            const data = await res.json();
            conversaAtiva = data.id;
            document.getElementById('chatContainer').innerHTML = '';
            if (window.innerWidth < 769) toggleSidebar();
            carregarConversas();
        }

        async function selecionarChat(id) {
            conversaAtiva = id;
            if (window.innerWidth < 769) toggleSidebar();
            const res = await fetch(`/carregar_historico/${id}`);
            const msgs = await res.json();
            document.getElementById('chatContainer').innerHTML = '';
            document.getElementById('welcome').style.display = 'none';
            msgs.forEach(m => addBubble(m.content, m.role));
            carregarConversas();
        }

        function addBubble(text, role, loadingId = null) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            if (loadingId) div.id = loadingId;
            div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
            div.innerHTML = role === 'assistant' ? marked.parse(text) : text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;

            // Ativa Highlight.js e Botão de Cópia
            div.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
            div.querySelectorAll('pre').forEach(pre => {
                if (!pre.querySelector('.copy-btn')) {
                    const btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.innerText = 'COPIAR';
                    btn.onclick = () => {
                        const code = pre.querySelector('code').innerText;
                        navigator.clipboard.writeText(code);
                        btn.innerText = 'OK!';
                        setTimeout(() => btn.innerText = 'COPIAR', 2000);
                    };
                    pre.appendChild(btn);
                }
            });
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg || !conversaAtiva) return;

            input.value = '';
            document.getElementById('welcome').style.display = 'none';
            addBubble(msg, 'user');

            const tempId = "L-" + Date.now();
            addBubble("<i>Processando comando...</i>", "assistant", tempId);

            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mensagem: msg, conversa_id: conversaAtiva})
            });
            const data = await res.json();
            document.getElementById(tempId).remove();
            addBubble(data.resposta, 'assistant');
        }

        document.getElementById('userInput').onkeypress = (e) => e.key === 'Enter' && enviar();
        window.onload = () => { carregarConversas(); novaConversa(); };
    </script>
</body>
</html>

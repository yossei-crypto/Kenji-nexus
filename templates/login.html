<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kenji IA — Acesso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #050508;
            --surface: rgba(18, 18, 26, 0.9);
            --border: #1e1e2e;
            --accent: #00ff88;
            --accent-dim: #00cc6a;
            --text: #e0e0e0;
            --text-dim: #888;
            --danger: #ff4444;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* CANVAS DA MATRIX */
        #matrix {
            position: fixed;
            top: 0; left: 0;
            z-index: 0;
            opacity: 0.25;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px; /* Cantos arredondados profissionais */
            padding: 48px 36px;
            box-shadow: 0 0 60px rgba(0,255,136,0.1);
            text-align: center;
        }

        .logo h1 {
            font-size: 2.2rem;
            color: var(--accent);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .logo p {
            color: var(--text-dim);
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            color: var(--text);
            text-align: center;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0,255,136,0.2);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 0 20px var(--accent); }

        .footer {
            margin-top: 25px;
            color: var(--text-dim);
            font-size: 0.7rem;
        }

        #audio-info {
            position: fixed;
            bottom: 10px;
            font-size: 10px;
            opacity: 0.3;
        }
    </style>
</head>
<body onclick="playMusic()">

    <canvas id="matrix"></canvas>

    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>Kenji IA</h1>
                <p>@cybernmap | Neural System v2.0</p>
            </div>
            
            <form id="loginForm" onsubmit="doLogin(event)">
                <div class="input-group">
                    <input type="password" id="senha" placeholder="DIGITE A SENHA MESTRA" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="btnLogin">Acessar Terminal</button>
            </form>
            
            <div id="errorMsg" style="color: var(--danger); font-size: 12px; margin-top: 15px;"></div>

            <div class="footer">
                Desenvolvido por <b>@cybernmap</b>
            </div>
        </div>
    </div>

    <div id="audio-info">AGUARDANDO INTERAÇÃO PARA ÁUDIO</div>

    <audio id="bgMusic" loop>
        <source src="/static/musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- MATRIX EFFECT ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff88";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- MUSIC LOGIC ---
        let audioPlay = false;
        function playMusic() {
            if (!audioPlay) {
                const music = document.getElementById('bgMusic');
                music.play().catch(() => {});
                document.getElementById('audio-info').innerText = "AUDIO SYSTEM: ONLINE";
                audioPlay = true;
            }
        }

        // --- LOGIN LOGIC ---
        async function doLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const errEl = document.getElementById('errorMsg');
            const senha = document.getElementById('senha').value;

            btn.disabled = true;
            btn.textContent = 'AUTENTICANDO...';

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ senha })
                });
                const data = await res.json();
                if (res.ok && data.status === 'ok') {
                    window.location.href = '/';
                } else {
                    errEl.textContent = 'ACESSO NEGADO, OPERADOR.';
                    btn.disabled = false;
                    btn.textContent = 'ACESSAR TERMINAL';
                }
            } catch (err) {
                errEl.textContent = 'FALHA NA CONEXÃO NEURAL.';
                btn.disabled = false;
                btn.textContent = 'ACESSAR TERMINAL';
            }
        }
    </script>
</body>
</html>

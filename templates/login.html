<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenji IA — Acesso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #00ff88;
            --green-dim: rgba(0,255,136,0.12);
            --green-glow: rgba(0,255,136,0.3);
            --cyan: #00ccff;
            --purple: #aa55ff;
            --bg: #03030a;
            --surface: rgba(6,6,14,0.85);
            --border: rgba(0,255,136,0.13);
            --border-strong: rgba(0,255,136,0.4);
            --text: #c8c8d8;
            --text-dim: #44445a;
            --red: #ff3355;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ── CANVAS BACKGROUND ── */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ── VIGNETTE ── */
        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 20%, rgba(3,3,10,0.7) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* ── SCANLINE ── */
        .scanline {
            position: fixed;
            left: 0; right: 0;
            height: 150px;
            background: linear-gradient(transparent, rgba(0,255,136,0.025), transparent);
            animation: scan 10s linear infinite;
            z-index: 2;
            pointer-events: none;
        }
        @keyframes scan { from { top: -150px; } to { top: 100vh; } }

        /* ── NOISE ── */
        .noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            z-index: 2;
            pointer-events: none;
            opacity: 0.4;
        }

        /* ── LAYOUT ── */
        .stage {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ── CARD ── */
        .card {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 44px 36px 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(0,255,136,0.04),
                0 24px 80px rgba(0,0,0,0.7),
                0 0 60px rgba(0,255,136,0.05),
                inset 0 1px 0 rgba(255,255,255,0.04);
            animation: cardIn 0.6s cubic-bezier(0.2,0,0,1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* card top border glow */
        .card::before {
            content: '';
            position: absolute;
            top: -1px; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--green), var(--cyan), var(--green), transparent);
            border-radius: 50%;
            opacity: 0.6;
            animation: topGlow 3s ease-in-out infinite;
        }
        @keyframes topGlow {
            0%,100% { opacity: 0.4; } 50% { opacity: 0.9; }
        }

        /* ── LOGO ── */
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px; height: 60px;
            border: 1px solid var(--border-strong);
            border-radius: 16px;
            background: var(--green-dim);
            margin-bottom: 18px;
            position: relative;
            animation: badgePulse 3s ease-in-out infinite;
        }
        @keyframes badgePulse {
            0%,100% { box-shadow: 0 0 20px rgba(0,255,136,0.15); }
            50%      { box-shadow: 0 0 40px rgba(0,255,136,0.35), 0 0 80px rgba(0,255,136,0.1); }
        }
        .logo-badge svg { width: 28px; height: 28px; }

        .logo h1 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--green);
            letter-spacing: 8px;
            text-transform: uppercase;
            line-height: 1;
            text-shadow: 0 0 20px rgba(0,255,136,0.4), 0 0 40px rgba(0,255,136,0.1);
        }

        .logo .tagline {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 3px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* ── TERMINAL LINE ── */
        .terminal-line {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .terminal-line .prompt { color: var(--green); }
        .cursor {
            display: inline-block;
            width: 7px; height: 13px;
            background: var(--green);
            opacity: 0.8;
            animation: blink 1.1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        @keyframes blink { 0%,100% { opacity: 0.8; } 50% { opacity: 0; } }

        /* ── FIELD ── */
        .field { position: relative; margin-bottom: 16px; }

        .field label {
            display: block;
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 7px;
        }

        .field-inner {
            position: relative;
            display: flex;
            align-items: center;
        }

        .field-icon {
            position: absolute;
            left: 14px;
            color: var(--text-dim);
            font-size: 14px;
            pointer-events: none;
            transition: color 0.2s;
        }

        .field input {
            width: 100%;
            background: rgba(3,3,10,0.8);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 13px 44px 13px 42px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            letter-spacing: 2px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input:focus {
            border-color: var(--border-strong);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.08);
        }
        .field-inner:focus-within .field-icon { color: var(--green); }

        .toggle-pw {
            position: absolute;
            right: 13px;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 15px;
            padding: 4px;
            transition: color 0.2s;
            line-height: 1;
        }
        .toggle-pw:hover { color: var(--green); }

        /* strength bar */
        .strength-bar { display: flex; gap: 4px; margin-top: 8px; height: 3px; }
        .strength-bar span { flex: 1; border-radius: 2px; background: rgba(255,255,255,0.06); transition: background 0.3s; }

        /* ── BUTTON ── */
        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: var(--green);
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.2s;
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }
        .btn:hover:not(:disabled)::before { transform: translateX(100%); }
        .btn:hover:not(:disabled) { box-shadow: 0 0 30px var(--green-glow); transform: translateY(-1px); }
        .btn:active:not(:disabled) { transform: scale(0.98); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .btn .spinner {
            display: none;
            width: 14px; height: 14px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        .btn.loading .spinner { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── ERROR ── */
        .error-wrap {
            min-height: 28px;
            margin-top: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }
        .error-msg {
            font-size: 11px;
            color: var(--red);
            letter-spacing: 0.5px;
            text-align: center;
            opacity: 0;
            transform: translateY(-4px);
            transition: opacity 0.2s, transform 0.2s;
        }
        .error-msg.visible { opacity: 1; transform: translateY(0); }
        .error-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red); flex-shrink: 0; opacity: 0; transition: opacity 0.2s; }
        .error-dot.visible { opacity: 1; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60%  { transform: translateX(-6px); }
            40%,80%  { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease; }

        /* ── MUSIC BTN ── */
        #music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            width: 42px; height: 42px;
            border-radius: 50%;
            background: rgba(0,255,136,0.1);
            border: 1px solid var(--border-strong);
            color: var(--green);
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
        }
        #music-btn:hover { background: rgba(0,255,136,0.2); box-shadow: 0 0 20px var(--green-glow); }
        #music-btn.playing { animation: musicPulse 1s ease-in-out infinite; }
        @keyframes musicPulse { 0%,100% { box-shadow: 0 0 8px rgba(0,255,136,0.3); } 50% { box-shadow: 0 0 24px rgba(0,255,136,0.6); } }

        /* ── FOOTER ── */
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
            line-height: 2;
        }
        .footer a { color: var(--green); text-decoration: none; font-weight: 600; transition: text-shadow 0.2s; }
        .footer a:hover { text-shadow: 0 0 12px var(--green); color: #fff; }

        /* ── DIVIDER ── */
        hr { border: none; border-top: 1px solid rgba(255,255,255,0.04); margin: 28px 0 0; }
    </style>
</head>
<body>

<!-- Canvas background -->
<canvas id="bg-canvas"></canvas>
<div class="vignette"></div>
<div class="scanline"></div>
<div class="noise"></div>

<!-- YouTube player oculto -->
<div id="yt-player" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;pointer-events:none;"></div>

<!-- Botão música -->
<button id="music-btn" onclick="toggleMusic()" title="Música">🎵</button>

<div class="stage">
    <div class="card" id="card">
        <div class="logo">
            <div class="logo-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="4 17 10 11 4 5"/>
                    <line x1="12" y1="19" x2="20" y2="19"/>
                </svg>
            </div>
            <h1>Kenji IA</h1>
            <div class="tagline">Sistema Neural v2.1</div>
        </div>

        <div class="terminal-line">
            <span class="prompt">$</span>
            <span>aguardando autenticação</span>
            <span class="cursor"></span>
        </div>

        <form id="loginForm" onsubmit="return doLogin(event)" novalidate>
            <div class="field">
                <label for="senha">Credencial de acesso</label>
                <div class="field-inner">
                    <span class="field-icon">🔑</span>
                    <input
                        type="password"
                        id="senha"
                        placeholder="••••••••••••"
                        autocomplete="current-password"
                        required
                        autofocus
                        oninput="onPasswordInput(this)"
                    >
                    <button type="button" class="toggle-pw" id="togglePw" onclick="togglePassword()" aria-label="Mostrar senha">👁</button>
                </div>
                <div class="strength-bar" id="strengthBar">
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>

            <button type="submit" class="btn" id="btnLogin">
                <span class="spinner"></span>
                <span id="btnText">Acessar Sistema</span>
            </button>
        </form>

        <div class="error-wrap">
            <div class="error-dot" id="errorDot"></div>
            <div class="error-msg" id="errorMsg"></div>
        </div>
        <hr>
    </div>

    <div class="footer">
        Kenji IA &mdash; Assistente Neural Avançado<br>
        Desenvolvido por <a href="https://www.instagram.com/cybernmap" target="_blank" rel="noopener">@cybernmap</a>
    </div>
</div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
// ===========================================
// CANVAS — PARTICLE NETWORK (igual ao vídeo)
// ===========================================
const canvas = document.getElementById('bg-canvas');
const ctx    = canvas.getContext('2d');

canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    initParticles();
}, { passive: true });

// Paleta de cores neon como no vídeo
const COLORS = ['#00ff88', '#00ccff', '#aa55ff', '#ff0055', '#ffcc00'];

let particles = [];
let mouse = { x: canvas.width / 2, y: canvas.height / 2 };

window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; }, { passive: true });

class Particle {
    constructor() { this.init(); }
    init() {
        this.x      = Math.random() * canvas.width;
        this.y      = Math.random() * canvas.height;
        this.vx     = (Math.random() - 0.5) * 0.6;
        this.vy     = (Math.random() - 0.5) * 0.6;
        this.radius = Math.random() * 2.5 + 1;
        this.color  = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.alpha  = Math.random() * 0.5 + 0.2;
        this.pulse  = Math.random() * Math.PI * 2;
    }
    update() {
        this.pulse += 0.02;
        this.x += this.vx;
        this.y += this.vy;

        // Repelir do mouse levemente
        const dx   = this.x - mouse.x;
        const dy   = this.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
            this.x += dx / dist * 0.8;
            this.y += dy / dist * 0.8;
        }

        // Wrap edges
        if (this.x < -10)                  this.x = canvas.width  + 10;
        if (this.x > canvas.width  + 10)   this.x = -10;
        if (this.y < -10)                  this.y = canvas.height + 10;
        if (this.y > canvas.height + 10)   this.y = -10;
    }
    draw() {
        const a = this.alpha * (0.7 + 0.3 * Math.sin(this.pulse));
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color.replace(')', `,${a})`).replace('rgb', 'rgba').replace('#', '');

        // Usar hex com alpha simples
        ctx.globalAlpha = a;
        ctx.fillStyle   = this.color;
        ctx.shadowBlur  = 8;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.shadowBlur  = 0;
    }
}

function initParticles() {
    const count = Math.floor((canvas.width * canvas.height) / 12000);
    particles   = Array.from({ length: Math.min(count, 120) }, () => new Particle());
}

function drawLines() {
    const maxDist = 160;
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const dx   = particles[i].x - particles[j].x;
            const dy   = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < maxDist) {
                const alpha = (1 - dist / maxDist) * 0.35;
                // Gradiente entre as duas cores das partículas
                const grad = ctx.createLinearGradient(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                grad.addColorStop(0, particles[i].color);
                grad.addColorStop(1, particles[j].color);
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = grad;
                ctx.lineWidth   = 0.8;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    drawLines();
    requestAnimationFrame(animate);
}

initParticles();
animate();

// ===========================================
// YOUTUBE PLAYER (oculto)
// ===========================================
let ytPlayer   = null;
let ytReady    = false;
let musicPlaying = false;

function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('yt-player', {
        videoId: 'XMEXPkPmmq0',
        playerVars: {
            autoplay: 0,
            loop:     1,
            playlist: 'XMEXPkPmmq0',
            controls: 0,
            disablekb: 1,
            fs: 0,
            modestbranding: 1,
        },
        events: {
            onReady: () => { ytReady = true; },
            onStateChange: e => {
                if (e.data === YT.PlayerState.ENDED) ytPlayer.playVideo();
            }
        }
    });
}

function toggleMusic() {
    if (!ytReady) return;
    const btn = document.getElementById('music-btn');
    if (musicPlaying) {
        ytPlayer.pauseVideo();
        btn.textContent = '🎵';
        btn.classList.remove('playing');
        musicPlaying = false;
    } else {
        ytPlayer.setVolume(40);
        ytPlayer.playVideo();
        btn.textContent = '🔊';
        btn.classList.add('playing');
        musicPlaying = true;
    }
}

// Tenta tocar automaticamente após interação do usuário
document.addEventListener('click', () => {
    if (ytReady && !musicPlaying) {
        ytPlayer.setVolume(40);
        ytPlayer.playVideo();
        document.getElementById('music-btn').textContent = '🔊';
        document.getElementById('music-btn').classList.add('playing');
        musicPlaying = true;
    }
}, { once: true });

// ===========================================
// FORM
// ===========================================
function togglePassword() {
    const inp = document.getElementById('senha');
    const btn = document.getElementById('togglePw');
    const isHidden = inp.type === 'password';
    inp.type    = isHidden ? 'text' : 'password';
    btn.textContent = isHidden ? '🙈' : '👁';
    inp.focus();
}

function onPasswordInput(inp) {
    const v = inp.value;
    const bars = document.querySelectorAll('#strengthBar span');
    let score = 0;
    if (v.length >= 6)  score++;
    if (v.length >= 10) score++;
    if (/[A-Z]/.test(v) && /[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const colors = ['#ff3355','#ff8833','#ffcc00','#00ff88'];
    bars.forEach((b, i) => {
        b.style.background = i < score ? colors[score - 1] : 'rgba(255,255,255,0.06)';
    });
    clearError();
}

function showError(msg) {
    const el   = document.getElementById('errorMsg');
    const dot  = document.getElementById('errorDot');
    const card = document.getElementById('card');
    el.textContent = msg;
    el.classList.add('visible');
    dot.classList.add('visible');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
}

function clearError() {
    document.getElementById('errorMsg').classList.remove('visible');
    document.getElementById('errorDot').classList.remove('visible');
}

async function doLogin(e) {
    e.preventDefault();
    const btn    = document.getElementById('btnLogin');
    const btnTxt = document.getElementById('btnText');
    const senha  = document.getElementById('senha').value;

    if (!senha.trim()) { showError('Informe a senha de acesso.'); return false; }

    btn.disabled = true;
    btn.classList.add('loading');
    btnTxt.textContent = 'Conectando...';
    clearError();

    try {
        const res  = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ senha })
        });
        const data = await res.json();
        if (res.ok && data.status === 'ok') {
            btnTxt.textContent    = '✓ Acesso liberado';
            btn.style.background  = '#00ff88';
            setTimeout(() => { window.location.href = '/'; }, 600);
        } else {
            showError(data.msg || 'Senha incorreta. Acesso negado.');
            btn.disabled = false;
            btn.classList.remove('loading');
            btnTxt.textContent = 'Acessar Sistema';
        }
    } catch {
        showError('Falha na conexão com o servidor.');
        btn.disabled = false;
        btn.classList.remove('loading');
        btnTxt.textContent = 'Acessar Sistema';
    }
    return false;
}

document.getElementById('senha').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin(e);
});
</script>
</body>
</html>

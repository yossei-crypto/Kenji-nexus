<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kenji IA — Acesso</title>
    <style>
        :root { --accent: #00ff88; --bg: #050508; }
        body { background: var(--bg); margin: 0; height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; font-family: monospace; }
        canvas { position: absolute; top: 0; left: 0; opacity: 0.2; }
        .card { position: relative; z-index: 10; background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(10px); border: 1px solid var(--accent); border-radius: 24px; padding: 40px; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 0 40px rgba(0, 255, 136, 0.1); }
        h1 { color: var(--accent); letter-spacing: 5px; margin-bottom: 5px; }
        p { color: #555; font-size: 10px; margin-bottom: 30px; letter-spacing: 2px; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #222; color: #fff; margin-bottom: 20px; border-radius: 12px; outline: none; text-align: center; }
        button { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body onclick="document.getElementById('bgm').play()">
    <canvas id="mtx"></canvas>
    <div class="card">
        <h1>KENJI IA</h1>
        <p>@cybernmap | NEURAL SYSTEM</p>
        <form onsubmit="doLogin(event)">
            <input type="password" id="pw" placeholder="SENHA MESTRA" required>
            <button type="submit">Acessar Terminal</button>
        </form>
    </div>
    <audio id="bgm" loop><source src="/static/musica.mp3" type="audio/mpeg"></audio>
    <script>
        const c = document.getElementById('mtx'), ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const drops = Array(Math.floor(c.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = "#00ff88"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(Math.random()*128), i*16, y*16);
                if(y*16 > c.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
            });
        }
        setInterval(draw, 50);
        async function doLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({senha:document.getElementById('pw').value})});
            if(res.ok) window.location.href='/'; else alert('NEGADO');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kenji IA | Terminal</title>
    <style>
        :root { --accent: #00e5ff; --bg: #000; --glass: rgba(10, 10, 10, 0.85); }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'JetBrains Mono', monospace; }
        
        body { background: var(--bg); height: 100dvh; overflow: hidden; display: flex; align-items: center; justify-content: center; color: var(--accent); }

        /* FUNDO MATRIX */
        #matrix { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.3; }

        /* CARD DE LOGIN MODERNO (MENOS QUADRADO) */
        .login-card {
            position: relative; z-index: 10;
            width: 90%; max-width: 380px;
            padding: 50px 30px;
            background: var(--glass);
            backdrop-filter: blur(15px); /* Efeito de vidro */
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 24px; /* Cantos arredondados profissionais */
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 229, 255, 0.1);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .brand { 
            font-size: 2.2rem; 
            font-weight: 900; 
            letter-spacing: 6px; 
            margin-bottom: 35px; 
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.5));
        }

        /* INPUTS ARREDONDADOS E MODERNOS */
        input {
            width: 100%; 
            padding: 18px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; /* Arredondamento suave */
            color: #fff; 
            margin-bottom: 25px; 
            outline: none; 
            text-align: center;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { 
            border-color: var(--accent); 
            background: rgba(0, 229, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        /* BOTÃO TÁTICO BRILHANTE */
        button {
            width: 100%; 
            padding: 18px; 
            background: var(--accent); 
            color: #000;
            border: none; 
            border-radius: 15px; 
            font-weight: 800; 
            cursor: pointer; 
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4);
        }

        button:active { transform: scale(0.95); }
        button:hover { background: #fff; box-shadow: 0 0 25px #fff; }

        .status { font-size: 10px; margin-top: 25px; opacity: 0.4; letter-spacing: 1px; }
    </style>
</head>
<body onclick="iniciarSessao()">

    <canvas id="matrix"></canvas>

    <div class="login-card">
        <div class="brand">Kenji IA</div>
        <input type="password" id="pass" placeholder="PASSWORD" autocomplete="current-password">
        <button onclick="fazerLogin()">ACESSAR TERMINAL</button>
        <div class="status" id="audio-status">@cybernmap | ENCRYPTED LINK</div>
    </div>

    <audio id="bgm" loop><source src="/static/musica.mp3" type="audio/mpeg"></audio>

    <script>
        // --- MATRIX ENGINE ---
        const canvas = document.getElementById('matrix'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        const fontSize = 16, columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00e5ff"; ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // --- SISTEMA ---
        let ativo = false;
        function iniciarSessao() {
            if(!ativo) {
                document.getElementById('bgm').play().catch(() => {});
                document.getElementById('audio-status').innerText = "AUDIO SYSTEM: ONLINE";
                ativo = true;
            }
        }

        async function fazerLogin() {
            const senha = document.getElementById('pass').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({senha: senha})
            });
            if(res.ok) window.location.href = '/';
            else {
                alert('ACESSO NEGADO');
                document.getElementById('pass').value = '';
            }
        }
    </script>
</body>
</html>

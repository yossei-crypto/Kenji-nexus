<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenji IA — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --green:#00ff88; --green-dim:rgba(0,255,136,0.1); --bg:#03030a; --surface:rgba(8,8,15,0.95); --border:rgba(0,255,136,0.15); --text:#c8c8d8; --text-dim:#55556a; --red:#ff4466; --yellow:#ffcc00; }
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { min-height:100%; font-family:'JetBrains Mono',monospace; background:var(--bg); color:var(--text); }
        header { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:rgba(7,7,15,0.95); backdrop-filter:blur(16px); position:sticky; top:0; z-index:50; }
        .logo { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; color:var(--green); letter-spacing:4px; }
        .logout { background:none; border:1px solid var(--border); color:var(--text-dim); padding:6px 14px; font-size:10px; font-family:'JetBrains Mono',monospace; border-radius:6px; cursor:pointer; letter-spacing:1px; transition:all 0.2s; }
        .logout:hover { color:var(--red); border-color:var(--red); }
        .main { max-width:900px; margin:0 auto; padding:32px 20px; }
        h2 { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; color:#fff; margin-bottom:20px; display:flex; align-items:center; gap:10px; }
        .badge { background:var(--red); color:#fff; font-size:11px; padding:2px 8px; border-radius:20px; font-family:'JetBrains Mono',monospace; }
        /* Cards de pagamento */
        .pag-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:16px; animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .pag-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
        .pag-info h3 { font-size:14px; color:#fff; font-weight:600; }
        .pag-info p { font-size:10px; color:var(--text-dim); margin-top:3px; letter-spacing:0.5px; }
        .pag-info .email { color:var(--green); font-size:12px; margin-top:4px; }
        .pag-actions { display:flex; gap:8px; }
        .btn-ver { background:none; border:1px solid var(--border); color:var(--text-dim); padding:7px 14px; font-size:10px; font-family:'JetBrains Mono',monospace; border-radius:8px; cursor:pointer; letter-spacing:1px; transition:all 0.2s; }
        .btn-ver:hover { color:#fff; border-color:rgba(255,255,255,0.3); }
        .btn-aprovar { background:var(--green); color:#000; border:none; padding:7px 16px; font-size:10px; font-family:'JetBrains Mono',monospace; font-weight:700; border-radius:8px; cursor:pointer; letter-spacing:1px; transition:all 0.2s; }
        .btn-aprovar:hover { box-shadow:0 0 14px rgba(0,255,136,0.4); }
        .btn-recusar { background:none; border:1px solid rgba(255,68,102,0.3); color:var(--red); padding:7px 14px; font-size:10px; font-family:'JetBrains Mono',monospace; border-radius:8px; cursor:pointer; letter-spacing:1px; transition:all 0.2s; }
        .btn-recusar:hover { background:rgba(255,68,102,0.1); }
        .btn-aprovar:disabled,.btn-recusar:disabled { opacity:0.4; cursor:not-allowed; }
        /* Modal comprovante */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity 0.3s; }
        .modal-overlay.open { opacity:1; pointer-events:all; }
        .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; max-width:480px; width:100%; animation:modalIn 0.3s ease; }
        @keyframes modalIn { from{transform:scale(0.95)} to{transform:scale(1)} }
        .modal h3 { font-size:14px; color:#fff; margin-bottom:14px; }
        .modal img { max-width:100%; max-height:400px; border-radius:10px; border:1px solid var(--border); display:block; margin:0 auto 16px; }
        .modal-actions { display:flex; gap:10px; justify-content:flex-end; }
        .close-btn { background:none; border:1px solid var(--border); color:var(--text-dim); padding:8px 16px; font-size:11px; font-family:'JetBrains Mono',monospace; border-radius:8px; cursor:pointer; }
        /* Empty */
        .empty { text-align:center; padding:60px 20px; color:var(--text-dim); }
        .empty .icon { font-size:48px; margin-bottom:16px; }
        .empty p { font-size:12px; letter-spacing:1px; }
        /* Tabs */
        .tabs { display:flex; gap:8px; margin-bottom:24px; border-bottom:1px solid var(--border); padding-bottom:12px; }
        .tab { background:none; border:none; color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:1px; padding:6px 14px; border-radius:6px; cursor:pointer; transition:all 0.2s; }
        .tab.active { color:var(--green); background:var(--green-dim); }
        /* Toast */
        #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:rgba(0,255,136,0.1); border:1px solid var(--green); color:var(--green); padding:10px 20px; border-radius:8px; font-size:12px; opacity:0; transition:all 0.3s; pointer-events:none; z-index:200; white-space:nowrap; }
        #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        #toast.err { background:rgba(255,68,102,0.1); border-color:var(--red); color:var(--red); }
        /* Usuarios table */
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:11px; }
        th { color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; padding:8px 12px; border-bottom:1px solid var(--border); text-align:left; }
        td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.03); color:var(--text); }
        tr:hover td { background:rgba(0,255,136,0.02); }
        .status-ativo { color:var(--green); }
        .status-pendente { color:var(--yellow); }
        .status-inativo { color:var(--red); }
    </style>
</head>
<body>
<header>
    <div class="logo">KENJI IA — ADMIN</div>
    <button class="logout" onclick="window.location.href='/admin/logout'">SAIR</button>
</header>

<div class="main">
    <div class="tabs">
        <button class="tab active" onclick="showTab('pagamentos',this)">💰 Pagamentos</button>
        <button class="tab" onclick="showTab('usuarios',this)">👥 Usuários</button>
    </div>

    <!-- PAGAMENTOS PENDENTES -->
    <div id="tab-pagamentos">
        <h2>Pagamentos Pendentes <span class="badge" id="count">0</span></h2>
        <div id="pagamentos-list">
            <div class="empty"><div class="icon">✅</div><p>Carregando...</p></div>
        </div>
    </div>

    <!-- USUÁRIOS -->
    <div id="tab-usuarios" style="display:none">
        <h2>Usuários Cadastrados</h2>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Email</th><th>Nome</th><th>Status</th><th>Acesso até</th><th>Cadastro</th></tr></thead>
                <tbody id="usuarios-body"><tr><td colspan="5" style="text-align:center;color:var(--text-dim)">Carregando...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal comprovante -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal">
        <h3 id="modal-title">Comprovante</h3>
        <img id="modal-img" alt="comprovante">
        <div class="modal-actions">
            <button class="close-btn" onclick="closeModal()">Fechar</button>
            <button class="btn-recusar" id="modal-recusar" onclick="recusarModal()">Recusar</button>
            <button class="btn-aprovar" id="modal-aprovar" onclick="aprovarModal()">✓ Aprovar</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
let currentPid = null;

function showTab(tab, el) {
    document.getElementById('tab-pagamentos').style.display = tab==='pagamentos'?'block':'none';
    document.getElementById('tab-usuarios').style.display   = tab==='usuarios'?'block':'none';
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    if(tab==='usuarios') loadUsuarios();
}

// ── Carregar pendentes ──
async function loadPendentes() {
    try {
        const r = await fetch('/admin/pendentes');
        const d = await r.json();
        document.getElementById('count').textContent = d.length;
        const list = document.getElementById('pagamentos-list');
        if(!d.length) {
            list.innerHTML = '<div class="empty"><div class="icon">✅</div><p>Nenhum pagamento pendente</p></div>';
            return;
        }
        list.innerHTML = d.map(p => `
            <div class="pag-card" id="card-${p.id}">
                <div class="pag-header">
                    <div class="pag-info">
                        <div class="email">${p.email}</div>
                        <p>${p.nome || 'Sem nome'}</p>
                        <p>Enviado: ${new Date(p.criado_em).toLocaleString('pt-BR')}</p>
                    </div>
                    <div class="pag-actions">
                        <button class="btn-ver" onclick="verComprovante('${p.id}','${p.email}')">👁 Ver</button>
                        <button class="btn-aprovar" onclick="aprovar('${p.id}',this)">✓ Aprovar</button>
                        <button class="btn-recusar" onclick="recusar('${p.id}',this)">✕ Recusar</button>
                    </div>
                </div>
            </div>
        `).join('');
    } catch(e) {
        document.getElementById('pagamentos-list').innerHTML = '<div class="empty"><p>Erro ao carregar</p></div>';
    }
}

// ── Ver comprovante ──
async function verComprovante(pid, email) {
    currentPid = pid;
    document.getElementById('modal-title').textContent = `Comprovante — ${email}`;
    document.getElementById('modal-img').src = '';
    document.getElementById('modal').classList.add('open');
    try {
        const r = await fetch(`/admin/comprovante/${pid}`);
        const d = await r.json();
        document.getElementById('modal-img').src = d.img;
    } catch { toast('Erro ao carregar imagem','err'); }
}

function closeModal(e) {
    if(!e || e.target === document.getElementById('modal')) {
        document.getElementById('modal').classList.remove('open');
        currentPid = null;
    }
}

async function aprovarModal() { if(currentPid) { await aprovar(currentPid); closeModal(); } }
async function recusarModal() { if(currentPid) { await recusar(currentPid); closeModal(); } }

// ── Aprovar ──
async function aprovar(pid, btnEl) {
    if(!confirm('Aprovar este pagamento?')) return;
    if(btnEl) { btnEl.disabled=true; btnEl.textContent='...'; }
    try {
        const r = await fetch(`/admin/aprovar/${pid}`,{method:'POST'});
        const d = await r.json();
        if(d.ok) {
            toast(`✅ Aprovado! Acesso até ${d.acesso_ate}`);
            document.getElementById(`card-${pid}`)?.remove();
            loadPendentes();
        } else { toast(d.erro||'Erro','err'); }
    } catch { toast('Erro de conexão','err'); }
    if(btnEl) { btnEl.disabled=false; btnEl.textContent='✓ Aprovar'; }
}

// ── Recusar ──
async function recusar(pid, btnEl) {
    if(!confirm('Recusar este pagamento?')) return;
    if(btnEl) { btnEl.disabled=true; }
    try {
        const r = await fetch(`/admin/recusar/${pid}`,{method:'POST'});
        const d = await r.json();
        if(d.ok) {
            toast('❌ Pagamento recusado');
            document.getElementById(`card-${pid}`)?.remove();
            loadPendentes();
        } else { toast(d.erro||'Erro','err'); }
    } catch { toast('Erro de conexão','err'); }
    if(btnEl) { btnEl.disabled=false; }
}

// ── Usuários ──
async function loadUsuarios() {
    try {
        const r = await fetch('/admin/usuarios');
        const d = await r.json();
        const body = document.getElementById('usuarios-body');
        if(!d.length) { body.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--text-dim)">Nenhum usuário</td></tr>'; return; }
        body.innerHTML = d.map(u => {
            const cls = u.status==='ativo'?'status-ativo':u.status==='pendente'?'status-pendente':'status-inativo';
            const ate = u.acesso_ate ? new Date(u.acesso_ate).toLocaleDateString('pt-BR') : '—';
            return `<tr>
                <td>${u.email}</td>
                <td>${u.nome||'—'}</td>
                <td class="${cls}">${u.status.toUpperCase()}</td>
                <td>${ate}</td>
                <td>${new Date(u.criado_em).toLocaleDateString('pt-BR')}</td>
            </tr>`;
        }).join('');
    } catch { document.getElementById('usuarios-body').innerHTML='<tr><td colspan="5">Erro ao carregar</td></tr>'; }
}

// ── Toast ──
function toast(msg, type='ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type==='err'?'err':''}`;
    setTimeout(()=>t.className='',3000);
}

// ── Teclado ──
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// ── Init ──
loadPendentes();
setInterval(loadPendentes, 30000); // Atualiza a cada 30s
</script>
</body>
</html>

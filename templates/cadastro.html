<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenji IA — Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --green:#00ff88; --green-dim:rgba(0,255,136,0.12); --green-glow:rgba(0,255,136,0.3); --bg:#03030a; --surface:rgba(8,8,15,0.9); --border:rgba(0,255,136,0.13); --border-strong:rgba(0,255,136,0.4); --text:#c8c8d8; --text-dim:#44445a; --red:#ff3355; }
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; font-family:'JetBrains Mono',monospace; background:var(--bg); color:var(--text); overflow:hidden; }
        #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
        .vignette { position:fixed; inset:0; background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 20%,rgba(3,3,10,0.7) 100%); z-index:1; pointer-events:none; }
        .scanline { position:fixed; left:0; right:0; height:120px; background:linear-gradient(transparent,rgba(0,255,136,0.025),transparent); animation:scan 9s linear infinite; z-index:2; pointer-events:none; }
        @keyframes scan { from{top:-120px} to{top:100vh} }
        .stage { position:relative; z-index:10; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; overflow-y:auto; }
        .card { width:100%; max-width:420px; background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:36px 32px; backdrop-filter:blur(20px); box-shadow:0 24px 80px rgba(0,0,0,0.7),0 0 60px rgba(0,255,136,0.05); animation:cardIn 0.5s ease both; }
        @keyframes cardIn { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
        .logo { text-align:center; margin-bottom:28px; }
        .logo h1 { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; color:var(--green); letter-spacing:6px; text-shadow:0 0 20px rgba(0,255,136,0.4); }
        .logo p { font-size:10px; color:var(--text-dim); letter-spacing:2px; margin-top:6px; }
        .field { margin-bottom:16px; }
        .field label { display:block; font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; margin-bottom:6px; }
        .field input { width:100%; background:rgba(3,3,10,0.8); border:1px solid rgba(255,255,255,0.06); border-radius:10px; padding:12px 14px; color:#fff; font-family:'JetBrains Mono',monospace; font-size:13px; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
        .field input:focus { border-color:var(--border-strong); box-shadow:0 0 0 3px rgba(0,255,136,0.08); }
        .btn { width:100%; padding:13px; margin-top:8px; background:var(--green); color:#000; border:none; border-radius:10px; font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
        .btn:hover { box-shadow:0 0 24px var(--green-glow); transform:translateY(-1px); }
        .btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
        .btn .spin { display:none; width:13px; height:13px; border:2px solid rgba(0,0,0,0.3); border-top-color:#000; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; margin-right:7px; }
        .btn.loading .spin { display:inline-block; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .err { font-size:11px; color:var(--red); text-align:center; margin-top:12px; min-height:18px; }
        .link-row { text-align:center; margin-top:20px; font-size:11px; color:var(--text-dim); }
        .link-row a { color:var(--green); text-decoration:none; }
        hr { border:none; border-top:1px solid rgba(255,255,255,0.04); margin:20px 0 0; }
        .footer { margin-top:20px; text-align:center; font-size:10px; color:var(--text-dim); }
        .footer a { color:var(--green); text-decoration:none; }
    </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="vignette"></div>
<div class="scanline"></div>
<div class="stage">
    <div class="card">
        <div class="logo">
            <h1>KENJI IA</h1>
            <p>CRIAR CONTA</p>
        </div>
        <div class="field">
            <label>Nome</label>
            <input type="text" id="nome" placeholder="Seu nome" autocomplete="name">
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="field">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <button class="btn" id="btn" onclick="cadastrar()">
            <span class="spin"></span>
            <span id="btn-txt">Criar Conta</span>
        </button>
        <div class="err" id="err"></div>
        <hr>
        <div class="link-row">Já tem conta? <a href="/login">Entrar</a></div>
    </div>
    <div class="footer">Desenvolvido por <a href="https://instagram.com/cybernmap" target="_blank">@cybernmap</a></div>
</div>
<script>
// Canvas particles (simplified)
const c=document.getElementById('bg-canvas'),x=c.getContext('2d');
c.width=window.innerWidth;c.height=window.innerHeight;
const COLS=['#00ff88','#00ccff','#aa55ff','#ff0055','#ffcc00'];
const pts=Array.from({length:60},()=>({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,r:Math.random()*2+1,col:COLS[Math.floor(Math.random()*5)],a:Math.random()*.4+.1,p:Math.random()*6}));
function draw(){x.clearRect(0,0,c.width,c.height);pts.forEach(p=>{p.p+=.02;p.x+=p.vx;p.y+=p.vy;if(p.x<-10)p.x=c.width+10;if(p.x>c.width+10)p.x=-10;if(p.y<-10)p.y=c.height+10;if(p.y>c.height+10)p.y=-10;x.globalAlpha=p.a*(0.7+0.3*Math.sin(p.p));x.beginPath();x.arc(p.x,p.y,p.r,0,6.28);x.fillStyle=p.col;x.shadowBlur=8;x.shadowColor=p.col;x.fill();x.globalAlpha=1;x.shadowBlur=0;});for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<150){const g=x.createLinearGradient(pts[i].x,pts[i].y,pts[j].x,pts[j].y);g.addColorStop(0,pts[i].col);g.addColorStop(1,pts[j].col);x.globalAlpha=(1-d/150)*.25;x.beginPath();x.moveTo(pts[i].x,pts[i].y);x.lineTo(pts[j].x,pts[j].y);x.strokeStyle=g;x.lineWidth=.8;x.stroke();x.globalAlpha=1;}}requestAnimationFrame(draw);}
draw();

async function cadastrar() {
    const btn=document.getElementById('btn'),btxt=document.getElementById('btn-txt'),err=document.getElementById('err');
    const nome=document.getElementById('nome').value.trim();
    const email=document.getElementById('email').value.trim();
    const senha=document.getElementById('senha').value;
    if(!email||!senha){err.textContent='Email e senha obrigatórios.';return;}
    btn.disabled=true;btn.classList.add('loading');btxt.textContent='Criando...';err.textContent='';
    try {
        const r=await fetch('/cadastro',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome,email,senha})});
        const d=await r.json();
        if(d.ok){window.location.href=d.redirect||'/pagamento';}
        else{err.textContent=d.erro||'Erro ao cadastrar.';}
    } catch{err.textContent='Erro de conexão.';}
    finally{btn.disabled=false;btn.classList.remove('loading');btxt.textContent='Criar Conta';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')cadastrar();});
</script>
</body>
</html>

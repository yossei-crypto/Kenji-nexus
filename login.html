<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | Kenji Nexus</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Share+Tech+Mono&display=swap');

        :root { --bg: #050505; --panel: #0a0a0a; --accent: #00ffcc; --text: #ffffff; --error: #ff2a2a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg); color: var(--text); display: flex;
            align-items: center; justify-content: center; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
            position: relative;
        }

        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .login-box {
            background-color: var(--panel); width: 100%; max-width: 420px;
            padding: 50px 40px; border-radius: 4px; border: 1px solid #1a1a1a;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.05), inset 0 0 20px rgba(0, 0, 0, 0.8);
            text-align: center; animation: bootUp 0.8s ease-out forwards;
            position: relative; z-index: 10;
        }

        @keyframes bootUp { 
            0% { opacity: 0; transform: scaleY(0.01) scaleX(0); filter: brightness(200%); }
            50% { transform: scaleY(0.01) scaleX(1); filter: brightness(150%); }
            100% { opacity: 1; transform: scaleY(1) scaleX(1); filter: brightness(100%); }
        }

        .glitch-wrapper { position: relative; margin-bottom: 5px; }
        .logo { 
            font-family: 'Share Tech Mono', monospace; font-size: 32px; font-weight: 800; 
            letter-spacing: 4px; color: var(--accent); position: relative;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        .logo::before, .logo::after {
            content: "KENJI NEXUS"; position: absolute; top: 0; left: 0; right: 0; 
            background: var(--panel); overflow: hidden; color: var(--accent);
        }
        .logo::before { left: 2px; text-shadow: -2px 0 red; animation: glitch-anim-1 2.5s infinite linear alternate-reverse; }
        .logo::after { left: -2px; text-shadow: -2px 0 blue; animation: glitch-anim-2 3s infinite linear alternate-reverse; }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); } 20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); } 60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); } 100% { clip-path: inset(30% 0 20% 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); } 20% { clip-path: inset(30% 0 20% 0); }
            40% { clip-path: inset(70% 0 10% 0); } 60% { clip-path: inset(20% 0 50% 0); }
            80% { clip-path: inset(50% 0 30% 0); } 100% { clip-path: inset(5% 0 80% 0); }
        }

        .subtitle { font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; color: #444; margin-bottom: 40px; letter-spacing: 2px;}

        input[type="password"] {
            width: 100%; background-color: #000; border: 1px solid #222; color: var(--accent);
            padding: 16px 20px; border-radius: 4px; font-family: 'Share Tech Mono', monospace; font-size: 1.2rem; outline: none;
            text-align: center; letter-spacing: 5px; transition: all 0.3s ease; margin-bottom: 25px;
        }
        input[type="password"]:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); }
        input[type="password"]::placeholder { color: #333; letter-spacing: 2px; font-size: 0.9rem; }

        .login-btn {
            width: 100%; background: rgba(0, 255, 204, 0.05); border: 1px solid var(--accent); color: var(--accent);
            padding: 16px; border-radius: 4px; font-family: 'Share Tech Mono', monospace; font-size: 1rem; 
            font-weight: 600; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 2px;
        }
        .login-btn:hover { background-color: var(--accent); color: #000; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); }

        #erro-msg { font-family: 'Share Tech Mono', monospace; color: var(--error); font-size: 0.85rem; margin-top: 15px; font-weight: 600; opacity: 0; transition: 0.3s;}
        
        .creator-tag { margin-top: 25px; font-size: 0.8rem; color: #444; font-family: 'Share Tech Mono', monospace;}
        .creator-tag a { color: #666; text-decoration: none; transition: 0.3s; font-weight: 600; letter-spacing: 1px;}
        .creator-tag a:hover { color: var(--accent); text-shadow: 0 0 8px var(--accent); }

        .shake { animation: shake 0.3s both; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }
        
        #audio-status {
            position: absolute; bottom: 10px; right: 15px; font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem; color: #444; z-index: 20;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="/static/musica.mp3" type="audio/mpeg">
    </audio>

    <div class="login-box" id="caixa-login">
        <div class="glitch-wrapper">
            <div class="logo">KENJI NEXUS</div>
        </div>
        <div class="subtitle">SYS.AUTH.REQ</div>
        
        <input type="password" id="palavra-passe" placeholder="INSERIR PAYLOAD" autocomplete="off">
        <button class="login-btn" onclick="autenticar()" id="btn-login">Executar</button>
        <div id="erro-msg">ACESSO NEGADO</div>

        <div class="creator-tag">
            ROOT // <a href="https://instagram.com/cybernmap" target="_blank">@cybernmap</a>
        </div>
    </div>
    
    <div id="audio-status">SISTEMA DE ÁUDIO PRONTO [CLIQUE NA TELA]</div>

    <script>
        const inputSenha = document.getElementById("palavra-passe");
        const btnLogin = document.getElementById("btn-login");
        const caixaLogin = document.getElementById("caixa-login");
        const bgMusic = document.getElementById("bg-music");
        const audioStatus = document.getElementById("audio-status");
        
        // Ativa a música no primeiro clique do usuário em qualquer lugar da tela
        document.body.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play().catch(e => console.log("O navegador bloqueou o áudio."));
                audioStatus.innerText = "ÁUDIO TOCANDO ///";
                audioStatus.style.color = "var(--accent)";
            }
        }, { once: true });

        setInterval(() => {
            if(!inputSenha.value && document.activeElement !== inputSenha) {
                inputSenha.placeholder = inputSenha.placeholder.endsWith("_") ? "INSERIR PAYLOAD" : "INSERIR PAYLOAD_";
            } else {
                inputSenha.placeholder = "INSERIR PAYLOAD";
            }
        }, 500);

        inputSenha.addEventListener("keypress", (e) => { if (e.key === "Enter") autenticar(); });

        async function autenticar() {
            const senha = inputSenha.value.trim();
            if (!senha) return;
            btnLogin.innerText = "PROCESSANDO...";
            
            try {
                const resposta = await fetch("/login", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ senha: senha })
                });
                if (resposta.ok) {
                    btnLogin.style.background = "var(--accent)"; btnLogin.style.color = "#000";
                    btnLogin.innerText = "BYPASS CONCLUÍDO"; 
                    
                    // Suaviza a música antes de entrar
                    let vol = 1;
                    const fadeOut = setInterval(() => {
                        if (vol > 0.1) { vol -= 0.1; bgMusic.volume = vol; }
                        else { clearInterval(fadeOut); }
                    }, 50);

                    setTimeout(() => { window.location.href = "/"; }, 600);
                } else {
                    mostrarErro();
                }
            } catch (e) { mostrarErro("FALHA NA CONEXÃO TCP"); }
        }

        function mostrarErro(msg = "ACESSO NEGADO") {
            document.getElementById("erro-msg").style.opacity = "1";
            document.getElementById("erro-msg").innerText = msg;
            btnLogin.innerText = "EXECUTAR"; inputSenha.value = "";
            
            caixaLogin.classList.remove("shake");
            void caixaLogin.offsetWidth;
            caixaLogin.classList.add("shake");
        }
    </script>
</body>
</html>
